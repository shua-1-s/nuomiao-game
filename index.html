<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="format-detection" content="telephone=no">
<title>挪喵大挑战 · 终版</title>
<style>
/* ========================================================
 * 《挪喵大挑战·终版》样式表
 * 所有视觉100%纯CSS实现 零外部依赖
 * ======================================================== */

/* ---------- 全局重置 ---------- */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none;font-family:"PingFang SC","Microsoft YaHei",sans-serif;-webkit-touch-callout:none}
html,body{width:100%;height:100%;overflow:hidden;touch-action:none;background:#ffd9e3;-webkit-overflow-scrolling:touch}

/* 马卡龙动态背景 */
body::before{content:"";position:fixed;inset:0;background:linear-gradient(135deg,#ffe0ec 0%,#ffd4c4 35%,#ffe8d1 70%,#dce8ff 100%);z-index:-2}
body::after{content:"";position:fixed;inset:0;background:radial-gradient(circle at 20% 30%,rgba(255,182,193,.3) 0%,transparent 40%),radial-gradient(circle at 80% 70%,rgba(255,218,185,.3) 0%,transparent 40%);z-index:-1}
@keyframes bgMove{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
@keyframes bgFloat{0%,100%{transform:translate3d(0,0,0)}50%{transform:translate3d(10px,-10px,0)}}

/* ---------- 游戏容器 ---------- */
#gameRoot{position:relative;width:100vw;height:100vh;max-width:500px;margin:0 auto;overflow:hidden;display:flex;flex-direction:column}

/* ---------- 软胶按钮系统 ---------- */
.btn{display:inline-flex;align-items:center;justify-content:center;padding:12px 26px;background:linear-gradient(145deg,#ffb88c,#ff8c6b);color:#fff;border:none;border-radius:24px;font-size:16px;font-weight:700;box-shadow:0 5px 0 #e8704e,0 8px 16px rgba(255,140,107,.25),inset 0 2px 4px rgba(255,255,255,.5);cursor:pointer;transition:transform .12s,box-shadow .12s;letter-spacing:1px;will-change:transform}
.btn:active{transform:translate3d(0,3px,0);box-shadow:0 2px 0 #e8704e,0 4px 8px rgba(255,140,107,.25),inset 0 2px 4px rgba(255,255,255,.5)}
.btn.small{padding:9px 16px;font-size:13px}
.btn.mini{padding:6px 12px;font-size:12px}
.btn.blue{background:linear-gradient(145deg,#a8d8ff,#6bb8ff);box-shadow:0 5px 0 #4a8fd4,0 8px 16px rgba(107,184,255,.25),inset 0 2px 4px rgba(255,255,255,.5)}
.btn.blue:active{box-shadow:0 2px 0 #4a8fd4,0 4px 8px rgba(107,184,255,.25),inset 0 2px 4px rgba(255,255,255,.5)}
.btn.pink{background:linear-gradient(145deg,#ffc2d4,#ff8fab);box-shadow:0 5px 0 #d66188,0 8px 16px rgba(255,143,171,.25),inset 0 2px 4px rgba(255,255,255,.5)}
.btn.pink:active{box-shadow:0 2px 0 #d66188,0 4px 8px rgba(255,143,171,.25),inset 0 2px 4px rgba(255,255,255,.5)}
.btn.green{background:linear-gradient(145deg,#b8e8c0,#7bcf8a);box-shadow:0 5px 0 #4fa05d,0 8px 16px rgba(123,207,138,.25),inset 0 2px 4px rgba(255,255,255,.5)}
.btn.green:active{box-shadow:0 2px 0 #4fa05d,0 4px 8px rgba(123,207,138,.25),inset 0 2px 4px rgba(255,255,255,.5)}
.btn.yellow{background:linear-gradient(145deg,#ffe5a0,#ffc857);color:#8a5a00;box-shadow:0 5px 0 #d99e2b,0 8px 16px rgba(255,200,87,.25),inset 0 2px 4px rgba(255,255,255,.5)}
.btn.yellow:active{box-shadow:0 2px 0 #d99e2b,0 4px 8px rgba(255,200,87,.25),inset 0 2px 4px rgba(255,255,255,.5)}
.btn.purple{background:linear-gradient(145deg,#d4b5ff,#a373ff);box-shadow:0 5px 0 #6e48c9,0 8px 16px rgba(163,115,255,.25),inset 0 2px 4px rgba(255,255,255,.5)}
.btn.purple:active{box-shadow:0 2px 0 #6e48c9,0 4px 8px rgba(163,115,255,.25),inset 0 2px 4px rgba(255,255,255,.5)}

/* ---------- 顶部栏 ---------- */
.topBar{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;background:rgba(255,255,255,.55);backdrop-filter:blur(15px);-webkit-backdrop-filter:blur(15px);border-bottom:2px solid rgba(255,255,255,.7);z-index:5;gap:8px}
.iconBtn{width:38px;height:38px;min-width:38px;border-radius:50%;background:linear-gradient(145deg,#fff,#ffeef2);border:none;box-shadow:0 3px 0 #ffc2d4,0 5px 10px rgba(0,0,0,.08);display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;transition:transform .12s;will-change:transform}
.iconBtn:active{transform:translate3d(0,2px,0);box-shadow:0 1px 0 #ffc2d4,0 2px 5px rgba(0,0,0,.08)}
.levelBox{font-size:14px;font-weight:700;color:#7a4a2a;background:linear-gradient(145deg,#fff,#fff3e8);padding:8px 14px;border-radius:20px;box-shadow:0 3px 0 #ffd8bb,0 5px 10px rgba(0,0,0,.08);white-space:nowrap}

/* 猫爪金币图标 */
.coinBox{display:flex;align-items:center;background:linear-gradient(145deg,#fff9e6,#ffecb3);border-radius:22px;padding:6px 12px 6px 6px;box-shadow:0 3px 0 #ffd54f,0 5px 10px rgba(0,0,0,.08);gap:5px}
.coinIcon{width:22px;height:22px;position:relative;display:inline-block;flex-shrink:0}
.coinIcon::before{content:"";position:absolute;width:70%;height:55%;background:radial-gradient(circle at 40% 40%,#ffecb3,#ff9800);border-radius:50%;left:15%;top:35%;box-shadow:inset -1px -1px 2px rgba(0,0,0,.2)}
.coinIcon::after{content:"";position:absolute;width:4px;height:4px;background:#ff9800;border-radius:50%;top:8%;left:2px;box-shadow:6px 0 0 #ff9800,12px 3px 0 #ff9800,17px 8px 0 #ff9800}
.coinNum{font-size:14px;font-weight:800;color:#e65100;min-width:20px}

/* ---------- 屏幕系统 ---------- */
.screen{position:absolute;top:0;left:0;width:100%;height:100%;display:none;flex-direction:column;animation:screenIn .15s ease-out}
.screen.active{display:flex}
@keyframes screenIn{from{opacity:0;transform:translate3d(0,10px,0)}to{opacity:1;transform:translate3d(0,0,0)}}

/* ---------- 主菜单 ---------- */
#mainMenu{justify-content:space-between;align-items:center;padding:20px 16px 10px;text-align:center;overflow-y:auto}
.titleWrap{margin-top:10px}
.gameTitle{font-size:42px;font-weight:900;background:linear-gradient(135deg,#ff6b9d,#ff8c6b,#ffc857);-webkit-background-clip:text;background-clip:text;color:transparent;text-shadow:3px 3px 0 rgba(255,255,255,.8);letter-spacing:3px;animation:titleBounce 2.5s infinite ease-in-out;filter:drop-shadow(2px 4px 0 rgba(0,0,0,.08))}
@keyframes titleBounce{0%,100%{transform:translate3d(0,0,0) rotate(-1deg)}50%{transform:translate3d(0,-6px,0) rotate(1deg)}}
.subTitle{font-size:13px;color:#a67455;margin-top:6px;letter-spacing:3px;font-weight:600}
.menuCat{width:130px;height:130px;margin:5px auto;position:relative;animation:catFloat 3s infinite ease-in-out}
@keyframes catFloat{0%,100%{transform:translate3d(0,0,0) rotate(-3deg)}50%{transform:translate3d(0,-10px,0) rotate(3deg)}}

/* 顶部徽章条：段位 + 终极挑战 */
.topBadgeRow{display:flex;gap:8px;margin:6px 0;flex-wrap:wrap;justify-content:center}
.rankBadge,.dailyBadge{display:flex;align-items:center;gap:6px;background:linear-gradient(145deg,#fff,#ffe8f0);border-radius:18px;padding:6px 12px;box-shadow:0 3px 0 #ffc2d4,0 5px 10px rgba(0,0,0,.08);font-size:12px;font-weight:700;color:#8a4a6a;position:relative}
.dailyBadge{background:linear-gradient(145deg,#fff5e0,#ffd88c);color:#8a5a00;box-shadow:0 3px 0 #ffa726,0 5px 10px rgba(0,0,0,.08)}
.dailyBadge .redDot{position:absolute;top:-2px;right:-2px;width:10px;height:10px;background:#ff3b30;border-radius:50%;border:2px solid #fff;animation:pulseDot 1.2s infinite}
@keyframes pulseDot{0%,100%{transform:scale(1)}50%{transform:scale(1.3)}}

/* 全服通关率条 */
.globalRateBar{margin:8px auto;padding:8px 16px;background:rgba(255,255,255,.7);border-radius:16px;font-size:12px;color:#7a4a2a;font-weight:700;box-shadow:0 2px 6px rgba(0,0,0,.08);max-width:280px}
.globalRateBar b{color:#ff3b30;font-size:14px}

.menuBtns{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;max-width:300px;margin:8px 0}
.menuBtns .btn{width:100%;padding:12px 8px;font-size:14px}
.menuBtns .btn.wide{grid-column:1/-1}
#bannerAd,#bannerAd2,#bannerAd3{width:100%;min-height:50px;background:linear-gradient(90deg,rgba(255,236,226,.8),rgba(255,220,230,.8));display:flex;align-items:center;justify-content:center;font-size:11px;color:#a67455;border-top:1px dashed rgba(255,140,107,.3);font-weight:600;flex-shrink:0}

/* ---------- 棋盘 ---------- */
.boardWrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px;position:relative;min-height:0}
.boardInfo{display:flex;justify-content:space-between;align-items:center;width:92%;max-width:420px;margin-bottom:8px;font-size:12px;color:#7a4a2a;font-weight:700;gap:6px;flex-wrap:wrap}
.infoBadge{background:rgba(255,255,255,.75);padding:5px 10px;border-radius:14px;box-shadow:0 2px 6px rgba(0,0,0,.08);display:flex;align-items:center;gap:3px;white-space:nowrap}
#gameBoard{position:relative;background:linear-gradient(145deg,#ffffff,#fff5f0);border-radius:22px;box-shadow:0 10px 30px rgba(255,140,107,.15),0 4px 12px rgba(0,0,0,.08),inset 0 2px 6px rgba(255,255,255,.9);border:3px solid rgba(255,255,255,.8)}
.cell{position:absolute;border:1.5px dashed rgba(255,160,130,.35);border-radius:12px;background:rgba(255,245,235,.4);box-sizing:border-box}
/* 特殊格子 */
.cell.block{background:linear-gradient(145deg,#8d8d8d,#5a5a5a);border:2px solid #3a3a3a;box-shadow:inset 0 2px 4px rgba(255,255,255,.2),inset 0 -2px 4px rgba(0,0,0,.3)}
.cell.block::before{content:"🧱";position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:60%}
.cell.portalA,.cell.portalB{background:radial-gradient(circle,rgba(163,115,255,.6),rgba(163,115,255,.2));border:2px solid #a373ff;animation:portalSpin 3s linear infinite}
.cell.portalB{background:radial-gradient(circle,rgba(107,184,255,.6),rgba(107,184,255,.2));border-color:#6bb8ff}
@keyframes portalSpin{0%{box-shadow:0 0 8px rgba(163,115,255,.5)}50%{box-shadow:0 0 16px rgba(163,115,255,.9)}100%{box-shadow:0 0 8px rgba(163,115,255,.5)}}
.cell.reverse{background:radial-gradient(circle,rgba(255,152,0,.5),rgba(255,152,0,.2));border:2px solid #ff9800}
.cell.reverse::before{content:"🔄";position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:50%}
.cell.ice{background:linear-gradient(145deg,#b3e5fc,#81d4fa);border:2px solid #29b6f6;box-shadow:inset 0 2px 4px rgba(255,255,255,.8)}
.cell.ice::before{content:"❄️";position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:50%}
.cell.lock{background:radial-gradient(circle,rgba(255,193,7,.4),rgba(255,193,7,.15));border:2px dashed #ffc107}
.cell.lock::before{content:"🔒";position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:50%}
.cell.target{background:radial-gradient(circle,rgba(76,175,80,.4),rgba(76,175,80,.15));border:2px solid #4caf50}
.cell.target::before{content:"🎯";position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:50%}

/* ---------- 猫咪：全新非对称设计 一眼看出朝向 ---------- */
.cat{position:absolute;cursor:pointer;transition:left .15s cubic-bezier(.25,1,.5,1),top .15s cubic-bezier(.25,1,.5,1);touch-action:none}
.cat.squish .catWrap{animation:squish .15s ease-out}
@keyframes squish{0%{transform:rotate(var(--r,0deg)) scale(1)}50%{transform:rotate(var(--r,0deg)) scale(.82)}100%{transform:rotate(var(--r,0deg)) scale(1)}}
.cat.launch .catWrap{animation:launchAnim .25s ease-out forwards}
@keyframes launchAnim{0%{transform:rotate(var(--r,0deg)) scale(1)}40%{transform:rotate(var(--r,0deg)) scale(1.1)}100%{transform:rotate(var(--r,0deg)) scale(1.2)}}
.cat.removing{animation:removeCat .35s ease-out forwards}
@keyframes removeCat{0%{opacity:1;transform:scale(1)}50%{opacity:.9;transform:scale(1.25)}100%{opacity:0;transform:scale(.3)}}
.cat.idle .catWrap{animation:idleBreath 4s ease-in-out infinite}
/* 猫多时关闭所有动画防卡 */
.no-anim .cat.idle .catWrap{animation:none}
.no-anim .cEyeL,.no-anim .cEyeR{animation:none}
.no-anim .cTail{animation:none}
.no-anim .cat.rare-sr::after,.no-anim .cat.rare-ssr::after{animation:none}
.no-anim .cat.rare-ssr .catWrap::after,.no-anim .cat.rare-ssr .catWrap::before{animation:none}
@keyframes idleBreath{0%,100%{transform:rotate(var(--r,0deg)) scale(1)}50%{transform:rotate(var(--r,0deg)) scale(1.025)}}
.cat.cheer{animation:cheer .6s ease-in-out}
@keyframes cheer{0%,100%{transform:translate3d(0,0,0)}25%{transform:translate3d(0,-15px,0)}75%{transform:translate3d(0,-15px,0)}}

/* 热区扩大30% */
.cat::before{content:"";position:absolute;inset:-15%;z-index:-1}

/* ========== SR 史诗猫咪：紫色发光描边 ========== */
.cat.rare-sr .cHead,
.cat.rare-sr .cBody{
  filter:drop-shadow(0 0 6px rgba(199,125,255,.9)) drop-shadow(0 0 3px rgba(199,125,255,.6));
}
.cat.rare-sr::after{
  content:"";position:absolute;inset:5%;border-radius:50%;
  background:radial-gradient(circle,transparent 55%,rgba(199,125,255,.3) 70%,transparent 85%);
  pointer-events:none;z-index:0;
  animation:srGlow 2s ease-in-out infinite;
}
@keyframes srGlow{0%,100%{opacity:.5;transform:scale(1)}50%{opacity:1;transform:scale(1.08)}}

/* ========== SSR 限定猫咪：金色发光 + 闪光粒子 ========== */
.cat.rare-ssr .cHead,
.cat.rare-ssr .cBody{
  filter:drop-shadow(0 0 8px rgba(255,215,0,1)) drop-shadow(0 0 4px rgba(255,140,0,.8));
}
.cat.rare-ssr::after{
  content:"";position:absolute;inset:0;border-radius:50%;
  background:radial-gradient(circle,transparent 50%,rgba(255,215,0,.45) 65%,transparent 85%);
  pointer-events:none;z-index:0;
  animation:ssrGlow 1.6s ease-in-out infinite;
}
@keyframes ssrGlow{0%,100%{opacity:.7;transform:scale(1) rotate(0deg)}50%{opacity:1;transform:scale(1.12) rotate(180deg)}}
/* SSR 闪光粒子环绕 */
.cat.rare-ssr .catWrap::after{
  content:"✨";position:absolute;top:-8px;right:-8px;font-size:14px;
  animation:ssrSparkle 2s ease-in-out infinite;pointer-events:none;
  filter:drop-shadow(0 0 4px gold);
}
.cat.rare-ssr .catWrap::before{
  content:"⭐";position:absolute;bottom:-8px;left:-8px;font-size:12px;
  animation:ssrSparkle 2s ease-in-out infinite .8s;pointer-events:none;
  filter:drop-shadow(0 0 4px gold);
}
@keyframes ssrSparkle{0%,100%{opacity:.4;transform:scale(.7) rotate(0deg)}50%{opacity:1;transform:scale(1.2) rotate(180deg)}}

/* R 稀有：淡蓝色描边 */
.cat.rare-r .cHead,
.cat.rare-r .cBody{
  filter:drop-shadow(0 0 4px rgba(107,184,255,.7));
}

/* 合成游戏：危险闪烁 + 全屏闪光 */
@keyframes roundDanger{
  0%,100%{box-shadow:0 4px 12px rgba(255,107,74,.35)}
  50%{box-shadow:0 4px 20px rgba(255,0,0,.8),0 0 30px rgba(255,0,0,.5)}
}
@keyframes mgFlashAnim{
  0%{opacity:.5}
  100%{opacity:0}
}
/* 道具获得闪烁 */
@keyframes itemGainFlash{
  0%,100%{transform:scale(1);box-shadow:0 3px 8px rgba(0,0,0,.08)}
  25%{transform:scale(1.15);box-shadow:0 0 20px #4caf50,0 3px 8px rgba(0,0,0,.08)}
  50%{transform:scale(1.1);box-shadow:0 0 14px #4caf50,0 3px 8px rgba(0,0,0,.08)}
  75%{transform:scale(1.12);box-shadow:0 0 18px #4caf50,0 3px 8px rgba(0,0,0,.08)}
}

/* catWrap 是整个猫咪的旋转容器 通过 --r 变量旋转到4个朝向 */
.catWrap{position:absolute;width:88%;height:88%;left:6%;top:6%;transform:rotate(var(--r,0deg));transform-origin:center center;transition:transform .15s}

/* ========== 猫咪头部 - 大圆 在顶部 ========== */
.cHead{position:absolute;left:18%;top:10%;width:64%;height:52%;background:var(--cc,#ffb074);border-radius:50% 50% 45% 45% / 52% 52% 48% 48%;box-shadow:inset -4px -6px 8px rgba(0,0,0,.2),inset 3px 3px 5px rgba(255,255,255,.45),0 3px 6px rgba(0,0,0,.15);z-index:5}

/* ========== 耳朵 - 两个三角形 在头顶前方 ========== */
.cEarL,.cEarR{position:absolute;top:2%;width:20%;height:22%;background:var(--cc,#ffb074);z-index:4;box-shadow:inset -1px -2px 3px rgba(0,0,0,.2)}
.cEarL{left:17%;border-radius:70% 30% 15% 15% / 90% 90% 10% 10%;transform:rotate(-15deg)}
.cEarR{right:17%;border-radius:30% 70% 15% 15% / 90% 90% 10% 10%;transform:rotate(15deg)}
.cEarL::after,.cEarR::after{content:"";position:absolute;left:20%;top:30%;width:60%;height:60%;background:#ffb3c1;border-radius:inherit}

/* ========== 眼睛 ========== */
.cEyeL,.cEyeR{position:absolute;top:25%;width:11%;height:13%;background:#2b2b2b;border-radius:50%;z-index:7;animation:blink 6s infinite}
.cEyeL{left:32%;animation-delay:.1s}
.cEyeR{right:32%}
.cEyeL::after,.cEyeR::after{content:"";position:absolute;width:48%;height:48%;background:#fff;border-radius:50%;top:10%;left:15%}
@keyframes blink{0%,92%,100%{transform:scaleY(1)}95%{transform:scaleY(.1)}}

/* ========== 腮红 ========== */
.cCheekL,.cCheekR{position:absolute;top:38%;width:12%;height:8%;background:radial-gradient(circle,rgba(255,140,160,.75),rgba(255,140,160,0));border-radius:50%;z-index:6}
.cCheekL{left:18%}
.cCheekR{right:18%}

/* ========== 鼻子 ========== */
.cNose{position:absolute;top:40%;left:46%;width:8%;height:5%;background:#ff7a94;border-radius:50% 50% 50% 50% / 40% 40% 60% 60%;z-index:7;box-shadow:inset -1px -1px 1px rgba(0,0,0,.15)}

/* ========== 嘴 ========== */
.cMouth{position:absolute;top:45%;left:42%;width:16%;height:5%;border-bottom:2px solid #4a2a1a;border-radius:0 0 50% 50%;z-index:7}

/* ========== 身体 - 椭圆 在头下方 ========== */
.cBody{position:absolute;left:26%;top:56%;width:48%;height:28%;background:var(--cc,#ffb074);border-radius:48% 48% 45% 45% / 45% 45% 55% 55%;box-shadow:inset -3px -5px 7px rgba(0,0,0,.2),inset 2px 2px 4px rgba(255,255,255,.3),0 2px 5px rgba(0,0,0,.12);z-index:2}

/* ========== 前爪 - 两个小圆 ========== */
.cPawL,.cPawR{position:absolute;top:80%;width:11%;height:10%;background:var(--cc,#ffb074);border-radius:45% 45% 55% 55% / 40% 40% 60% 60%;box-shadow:inset -1px -2px 2px rgba(0,0,0,.2),0 1px 2px rgba(0,0,0,.15);z-index:3}
.cPawL{left:30%}
.cPawR{right:30%}

/* ========== 尾巴 - 从身体后方（下方）伸出 卷曲 ========== */
.cTail{position:absolute;bottom:0%;left:50%;width:12%;height:22%;background:var(--cc,#ffb074);border-radius:50% 50% 50% 50% / 40% 40% 60% 60%;transform-origin:top center;transform:translateX(-50%) rotate(0deg);animation:tailWag 3s ease-in-out infinite;box-shadow:inset -2px -2px 3px rgba(0,0,0,.2);z-index:1}
@keyframes tailWag{0%,100%{transform:translateX(-50%) rotate(-18deg)}50%{transform:translateX(-50%) rotate(18deg)}}

/* ========== 朝向红色大箭头 在猫咪头部前方 ========== */
.cArrow{position:absolute;width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;color:#fff;background:linear-gradient(145deg,#ff5252,#c62828);border-radius:50%;box-shadow:0 3px 6px rgba(0,0,0,.35),inset 0 2px 3px rgba(255,255,255,.45);z-index:10;top:-8px;left:50%;transform:translateX(-50%);border:2px solid #fff}
.cArrow::before{content:"▲"}

/* ========== 特殊徽标 ========== */
.cSpecial{position:absolute;width:20px;height:20px;border-radius:50%;top:-4px;right:-4px;display:flex;align-items:center;justify-content:center;font-size:12px;z-index:11;box-shadow:0 2px 6px rgba(0,0,0,.35);animation:specialPulse 1.5s ease-in-out infinite;border:2px solid #fff}
.cSpecial.bomb{background:radial-gradient(circle,#ff6b6b,#c92a2a)}
.cSpecial.bomb::before{content:"💣"}
.cSpecial.rainbow{background:linear-gradient(135deg,#ff6b9d,#ffc857,#7bcf8a,#6bb8ff,#c77dff)}
.cSpecial.rainbow::before{content:"🌈"}
.cSpecial.magnet{background:radial-gradient(circle,#c77dff,#7048b8)}
.cSpecial.magnet::before{content:"🧲"}
.cSpecial.revive{background:radial-gradient(circle,#ffd700,#ff8c00)}
.cSpecial.revive::before{content:"✨"}
.catBody .special.egg{background:radial-gradient(circle,#ff6b9d,#e91e63)}
.catBody .special.egg::before{content:"🎁"}
@keyframes specialPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}

/* 滑动拖尾 */
.trail{position:fixed;pointer-events:none;border-radius:50%;z-index:1;will-change:transform,opacity}

/* ---------- 底部栏 ---------- */
.bottomBar{display:flex;justify-content:space-around;align-items:center;padding:10px 8px;background:rgba(255,255,255,.55);backdrop-filter:blur(15px);-webkit-backdrop-filter:blur(15px);border-top:2px solid rgba(255,255,255,.7);gap:5px;flex-shrink:0}
.bottomBar .btn{flex:1;max-width:95px}

/* ---------- 关卡选择 ---------- */
.pageContent{flex:1;overflow-y:auto;padding:14px;-webkit-overflow-scrolling:touch}
.levelGrid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;align-content:start}
.levelItem{aspect-ratio:1;border-radius:14px;background:linear-gradient(145deg,#fff,#ffe8d6);display:flex;flex-direction:column;align-items:center;justify-content:center;font-weight:800;box-shadow:0 4px 0 #ffc19a,0 6px 12px rgba(0,0,0,.1);cursor:pointer;font-size:18px;color:#c65f1f;position:relative;transition:transform .12s;will-change:transform}
.levelItem:active{transform:translate3d(0,2px,0)}
.levelItem.locked{background:linear-gradient(145deg,#e8e8e8,#c8c8c8);color:#888;box-shadow:0 4px 0 #a0a0a0,0 6px 12px rgba(0,0,0,.1)}
.levelItem.locked::before{content:"🔒";font-size:20px}
.levelItem.locked span{display:none}
.levelItem.passed{background:linear-gradient(145deg,#fff,#e0f7e8);color:#2e7d32;box-shadow:0 4px 0 #a5d6a7,0 6px 12px rgba(0,0,0,.1)}
.levelStars{position:absolute;top:-6px;right:-6px;font-size:10px;display:flex;gap:1px}
.levelStage{grid-column:1/-1;text-align:center;font-size:13px;font-weight:800;color:#8a4a2a;padding:10px 0 4px;letter-spacing:2px}
.levelStage::before,.levelStage::after{content:"✦";margin:0 8px;color:#ffb88c}

/* ---------- 图鉴 / 商城卡片 ---------- */
.cardGrid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;align-content:start}
.skinCard{background:linear-gradient(145deg,#fff,#fff3e8);border-radius:18px;padding:12px 8px;box-shadow:0 4px 0 #ffd8bb,0 6px 12px rgba(0,0,0,.08);display:flex;flex-direction:column;align-items:center;text-align:center;cursor:pointer;transition:transform .12s;will-change:transform;position:relative}
.skinCard:active{transform:translate3d(0,2px,0)}
.skinCard.locked{opacity:.75;filter:grayscale(.5)}
.skinCard.current{border:3px solid #ff8c6b;box-shadow:0 4px 0 #ff8c6b,0 6px 14px rgba(255,140,107,.3)}
.skinCard.rarity-r{border-top:3px solid #6bb8ff}
.skinCard.rarity-sr{border-top:3px solid #c77dff}
.skinCard.rarity-ssr{border-top:3px solid #ffc107;animation:ssrShine 2s infinite}
@keyframes ssrShine{0%,100%{box-shadow:0 4px 0 #ffd8bb,0 6px 12px rgba(255,193,7,.3)}50%{box-shadow:0 4px 0 #ffd8bb,0 6px 20px rgba(255,193,7,.7)}}
.rarityTag{position:absolute;top:6px;right:6px;font-size:9px;padding:2px 6px;border-radius:8px;font-weight:800;color:#fff}
.rarityTag.n{background:#999}
.rarityTag.r{background:#6bb8ff}
.rarityTag.sr{background:#c77dff}
.rarityTag.ssr{background:linear-gradient(90deg,#ffc107,#ff6b6b)}
.skinPreview{width:70px;height:70px;margin:6px 0;position:relative}
.skinName{font-size:13px;font-weight:800;color:#7a4a2a;margin:3px 0}
.skinDesc{font-size:10px;color:#a67455;margin-bottom:4px;min-height:14px}
.skinPrice{font-size:11px;color:#e65100;font-weight:700}

/* ---------- 弹窗 ---------- */
.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.55);display:none;align-items:center;justify-content:center;z-index:100;padding:20px}
.modal.active{display:flex}
.modalBox{background:linear-gradient(145deg,#fff,#fff5eb);border-radius:26px;padding:24px 20px;width:100%;max-width:340px;text-align:center;box-shadow:0 15px 50px rgba(0,0,0,.3);animation:modalPop .35s cubic-bezier(.175,.885,.32,1.4);border:3px solid rgba(255,255,255,.8);max-height:90vh;overflow-y:auto}
@keyframes modalPop{0%{transform:scale(.5);opacity:0}100%{transform:scale(1);opacity:1}}
.modalTitle{font-size:22px;font-weight:900;color:#ff6b4a;margin-bottom:12px}
.modalText{font-size:14px;color:#7a4a2a;margin-bottom:18px;line-height:1.6}
.modalBtns{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.modalBtns .btn{min-width:100px}

/* ---------- 新手引导 ---------- */
#guide{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:90;display:none;align-items:center;justify-content:center;pointer-events:none}
#guide.active{display:flex}
.guideHand{font-size:54px;animation:handSlide 1.5s infinite}
@keyframes handSlide{0%,100%{transform:translate3d(0,0,0)}50%{transform:translate3d(50px,-50px,0)}}
.guideText{position:absolute;bottom:28%;left:50%;transform:translateX(-50%);background:#fff;padding:12px 22px;border-radius:22px;font-size:14px;color:#7a4a2a;font-weight:700;box-shadow:0 6px 20px rgba(0,0,0,.25);white-space:nowrap}

/* ---------- 特效 ---------- */
.coinFly{position:fixed;width:22px;height:22px;pointer-events:none;z-index:200;will-change:transform}
.coinFly::before{content:"🐾";font-size:22px;filter:drop-shadow(0 0 4px #ffc107)}
.firework{position:fixed;pointer-events:none;z-index:150;font-size:20px;will-change:transform,opacity}
.toast{position:fixed;top:28%;left:50%;transform:translate(-50%,-50%);background:rgba(60,30,20,.85);color:#fff;padding:12px 24px;border-radius:24px;font-size:15px;font-weight:700;z-index:250;box-shadow:0 8px 24px rgba(0,0,0,.3);animation:toastIn .25s;backdrop-filter:blur(8px);max-width:85%;text-align:center}
@keyframes toastIn{from{opacity:0;transform:translate(-50%,-90%)}to{opacity:1;transform:translate(-50%,-50%)}}

/* ---------- 计时器 ---------- */
.timer{font-size:13px;font-weight:800;color:#e65100;background:rgba(255,235,180,.9);padding:6px 12px;border-radius:14px;box-shadow:0 2px 6px rgba(0,0,0,.08)}
.timer.danger{color:#d32f2f;animation:timerShake .3s infinite}
@keyframes timerShake{0%,100%{transform:translateX(0)}25%{transform:translateX(-2px)}75%{transform:translateX(2px)}}

/* ---------- 通用列表项 ---------- */
.listItem{background:linear-gradient(145deg,#fff,#fff5eb);border-radius:14px;padding:12px;margin-bottom:10px;box-shadow:0 3px 10px rgba(0,0,0,.06);display:flex;justify-content:space-between;align-items:center;gap:10px}
.listInfo{flex:1;min-width:0}
.listName{font-size:14px;font-weight:800;color:#7a4a2a;margin-bottom:3px}
.listDesc{font-size:11px;color:#a67455}
.taskBar{width:100%;height:6px;background:#ffe0c8;border-radius:3px;margin-top:5px;overflow:hidden}
.taskBar>div{height:100%;background:linear-gradient(90deg,#ffb88c,#ff6b4a);transition:width .5s;will-change:width}

/* ---------- 段位页 ---------- */
.rankBigBadge{display:inline-flex;flex-direction:column;align-items:center;padding:18px 32px;background:linear-gradient(145deg,#fff,#fff3e8);border-radius:22px;box-shadow:0 6px 20px rgba(0,0,0,.1);margin-bottom:12px;width:100%;max-width:300px}
.rankEmojiBig{font-size:54px;margin-bottom:4px}
.rankNameBig{font-size:20px;font-weight:900;color:#c65f1f;margin-bottom:2px}
.rankSub{font-size:11px;color:#a67455}
.lvBar{width:100%;max-width:280px;height:10px;background:#ffe0c8;border-radius:5px;overflow:hidden;margin:8px auto}
.lvBar>div{height:100%;background:linear-gradient(90deg,#ffc857,#ff6b4a);transition:width .6s;will-change:width}

/* ---------- Tab切换 ---------- */
.tabBar{display:flex;gap:6px;padding:10px 12px 0;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tabBar::-webkit-scrollbar{display:none}
.tabItem{padding:7px 14px;background:rgba(255,255,255,.6);border-radius:14px;font-size:12px;font-weight:700;color:#a67455;white-space:nowrap;cursor:pointer;flex-shrink:0;transition:all .12s}
.tabItem.active{background:linear-gradient(145deg,#ffb88c,#ff8c6b);color:#fff;box-shadow:0 3px 0 #e8704e}
.tabItem:active{transform:translate3d(0,1px,0)}

/* ---------- 签到 ---------- */
.signGrid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.signDay{aspect-ratio:1;background:linear-gradient(145deg,#fff,#fff5e8);border-radius:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#a67455;box-shadow:0 3px 0 #ffd8bb;position:relative;padding:4px}
.signDay.done{background:linear-gradient(145deg,#b8e8c0,#7bcf8a);color:#fff;box-shadow:0 3px 0 #4fa05d}
.signDay.done::after{content:"✓";position:absolute;top:4px;right:6px;font-size:14px;font-weight:900}
.signDay.today{animation:todayPulse 1.5s infinite}
@keyframes todayPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
.signReward{font-size:18px;margin-bottom:2px}

/* ---------- 扭蛋机 ---------- */
.gachaBox{text-align:center;padding:20px}
.gachaMachine{width:180px;height:200px;margin:0 auto 16px;position:relative}
.gachaMachine::before{content:"";position:absolute;top:0;left:50%;transform:translateX(-50%);width:150px;height:140px;background:radial-gradient(circle at 50% 40%,#fff,#ffe0e8);border:4px solid #ff8fab;border-radius:50% 50% 30% 30%;box-shadow:inset 0 -10px 20px rgba(255,140,170,.3),0 5px 15px rgba(0,0,0,.15)}
.gachaMachine::after{content:"🎁";position:absolute;top:60px;left:50%;transform:translateX(-50%);font-size:40px;animation:gachaSpin 2s ease-in-out infinite}
@keyframes gachaSpin{0%,100%{transform:translateX(-50%) rotate(-10deg)}50%{transform:translateX(-50%) rotate(10deg)}}
.gachaBase{position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:170px;height:60px;background:linear-gradient(145deg,#ff8c6b,#e8704e);border-radius:12px;box-shadow:0 5px 15px rgba(0,0,0,.2)}

/* ---------- 无尽模式 ---------- */

/* ---------- 成就图标 ---------- */
.achvIcon{width:40px;height:40px;border-radius:50%;background:linear-gradient(145deg,#ffc857,#ff8c6b);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;box-shadow:0 3px 8px rgba(0,0,0,.15)}
.achvIcon.locked{background:linear-gradient(145deg,#ccc,#999);filter:grayscale(.8)}

/* ---------- 提示红点 ---------- */
.redDot{position:absolute;top:-4px;right:-4px;width:10px;height:10px;background:#ff3b30;border-radius:50%;border:2px solid #fff;animation:pulseDot 1.2s infinite}

/* ---------- 小屏适配 ---------- */
@media (max-height:640px){
  .gameTitle{font-size:34px}
  .menuCat{width:100px;height:100px}
  .menuBtns{gap:8px}
  .menuBtns .btn{padding:10px 8px;font-size:13px}
}
</style>
</head>
<body>
<div id="gameRoot">

  <!-- ========== 主菜单 ========== -->
  <div id="mainMenu" class="screen active">
    <div class="titleWrap">
      <div class="gameTitle">挪喵大挑战</div>
      <div class="subTitle">🐾 治愈解压 · 软萌解谜 🐾</div>
    </div>
    <div class="menuCat" id="menuCat"></div>
    <div class="topBadgeRow">
      <div class="rankBadge" id="rankBadge"><span>🥉</span><span>新手铲屎官</span></div>
      <div class="dailyBadge" onclick="startDailyUltimate()">
        <span>🔥</span><span>今日终极挑战</span>
        <div class="redDot" id="dailyDot"></div>
      </div>
    </div>
    <div class="globalRateBar">今日仅 <b id="globalRate">0.38%</b> 的玩家通关终极挑战</div>
    <div class="menuBtns">
      <button class="btn wide" onclick="startGameNormal()">开始游戏</button>
      <button class="btn blue" onclick="goScreen('levelScreen');renderLevels()">关卡选择</button>
      <button class="btn purple" onclick="mgEnterGame()">合成猫咪</button>
      <button class="btn yellow" onclick="goScreen('taskScreen');renderTasks()">每日任务</button>
      <button class="btn pink" onclick="goScreen('shopScreen');renderShop()">道具商城</button>
      <button class="btn green" onclick="goScreen('skinScreen');renderSkins()">猫咪图鉴</button>
      <button class="btn" onclick="goScreen('gachaScreen');renderGacha()">扭蛋盲盒</button>
      <button class="btn yellow" onclick="goScreen('signScreen');renderSign()">每日签到</button>
      <button class="btn blue" onclick="goScreen('achvScreen');renderAchv()">成就图鉴</button>
    </div>
    <div id="bannerAd">📢 Banner广告位 · 接入后显示广告</div>
  </div>

  <!-- ========== 游戏界面 ========== -->
  <div id="gameScreen" class="screen">
    <div class="topBar">
      <button class="iconBtn" onclick="goScreen('mainMenu')">🏠</button>
      <div class="levelBox" id="curLevelText">第 1 关</div>
      <div class="coinBox"><div class="coinIcon"></div><span class="coinNum" id="coinNum">0</span></div>
    </div>
    <div class="boardWrap">
      <div class="boardInfo">
        <span class="infoBadge">🐾 <span id="stepCount">0</span></span>
        <span class="infoBadge" id="modeDisplay">🌿 简单</span>
        <span class="infoBadge">🐱 <span id="catLeft">0</span></span>
      </div>
      <div id="gameBoard"></div>
      <div id="timerWrap" style="margin-top:8px;display:none"><span class="timer" id="timerText">⏱ 30s</span></div>
    </div>
    <div class="bottomBar">
      <button class="btn small yellow" onclick="startLevel(G.curLevel)">🔄</button>
      <button class="btn small blue" onclick="useItem('hint')">💡</button>
      <button class="btn small pink" onclick="useItem('undo')">↩️</button>
      <button class="btn small green" onclick="useItem('bomb')">💣</button>
      <button class="btn small purple" onclick="toggleDifficulty()" id="diffBtn">⚙️</button>
    </div>
  </div>

  <!-- ========== 关卡选择 ========== -->
  <div id="levelScreen" class="screen">
    <div class="topBar">
      <button class="iconBtn" onclick="goScreen('mainMenu')">←</button>
      <div class="levelBox">关卡选择</div>
      <div class="coinBox"><div class="coinIcon"></div><span class="coinNum">0</span></div>
    </div>
    <div class="pageContent">
      <div class="levelGrid" id="levelGrid"></div>
    </div>
    <div id="bannerAd2">📢 Banner广告位</div>
  </div>

  <!-- ========== 图鉴 ========== -->
  <div id="skinScreen" class="screen">
    <div class="topBar">
      <button class="iconBtn" onclick="goScreen('mainMenu')">←</button>
      <div class="levelBox">猫咪图鉴</div>
      <div class="coinBox"><div class="coinIcon"></div><span class="coinNum">0</span></div>
    </div>
    <div class="tabBar">
      <div class="tabItem active" onclick="switchSkinTab('cat',this)">猫咪</div>
      <div class="tabItem" onclick="switchSkinTab('board',this)">棋盘</div>
      <div class="tabItem" onclick="switchSkinTab('fx',this)">特效</div>
      <div class="tabItem" onclick="switchSkinTab('audio',this)">音效</div>
      <div class="tabItem" onclick="switchSkinTab('frame',this)">头像框</div>
    </div>
    <div class="pageContent">
      <div class="cardGrid" id="skinGrid"></div>
    </div>
  </div>

  <!-- ========== 每日任务 ========== -->
  <div id="taskScreen" class="screen">
    <div class="topBar">
      <button class="iconBtn" onclick="goScreen('mainMenu')">←</button>
      <div class="levelBox">每日任务</div>
      <div class="coinBox"><div class="coinIcon"></div><span class="coinNum">0</span></div>
    </div>
    <div class="pageContent" id="taskList"></div>
  </div>

  <!-- ========== 道具商城 ========== -->
  <div id="shopScreen" class="screen">
    <div class="topBar">
      <button class="iconBtn" onclick="goScreen('mainMenu')">←</button>
      <div class="levelBox">道具商城</div>
      <div class="coinBox"><div class="coinIcon"></div><span class="coinNum">0</span></div>
    </div>
    <div class="pageContent" id="shopList"></div>
  </div>

  <!-- ========== 扭蛋盲盒 ========== -->
  <div id="gachaScreen" class="screen">
    <div class="topBar">
      <button class="iconBtn" onclick="goScreen('mainMenu')">←</button>
      <div class="levelBox">猫咪扭蛋机</div>
      <div class="coinBox"><div class="coinIcon"></div><span class="coinNum">0</span></div>
    </div>
    <div class="pageContent" id="gachaBox"></div>
  </div>

  <!-- ========== 每日签到 ========== -->
  <div id="signScreen" class="screen">
    <div class="topBar">
      <button class="iconBtn" onclick="goScreen('mainMenu')">←</button>
      <div class="levelBox">每日签到</div>
      <div class="coinBox"><div class="coinIcon"></div><span class="coinNum">0</span></div>
    </div>
    <div class="pageContent" id="signContent"></div>
  </div>

  <!-- ========== 成就图鉴 ========== -->
  <div id="achvScreen" class="screen">
    <div class="topBar">
      <button class="iconBtn" onclick="goScreen('mainMenu')">←</button>
      <div class="levelBox">成就图鉴</div>
      <div class="coinBox"><div class="coinIcon"></div><span class="coinNum">0</span></div>
    </div>
    <div class="pageContent" id="achvList"></div>
  </div>

  <!-- ========== 合成猫咪 ========== -->
  <div id="mergeScreen" class="screen">
    <div class="topBar">
      <button class="iconBtn" onclick="goScreen('mainMenu')">←</button>
      <div class="levelBox">合成猫咪</div>
      <div class="coinBox"><div class="coinIcon"></div><span class="coinNum">0</span></div>
    </div>
    <div class="pageContent" id="mergeContent"></div>
  </div>

</div>

<!-- 新手引导 -->
<div id="guide">
  <div class="guideHand">👆</div>
  <div class="guideText">点击猫咪 · 沿红箭头滑出棋盘</div>
</div>

<!-- 弹窗 -->
<div class="modal" id="modal">
  <div class="modalBox">
    <div class="modalTitle" id="modalTitle">提示</div>
    <div class="modalText" id="modalText">内容</div>
    <div class="modalBtns" id="modalBtns"></div>
  </div>
</div>

<script>
/* ============================================================
 * 《挪喵大挑战·终版》核心逻辑
 * 作者：Claude · 单文件HTML · 零依赖
 * ============================================================ */

/* ================= 全局状态 G ================= */
var G = {
  /* 基础资源 */
  coin:500, diamond:0,
  /* 关卡 */
  curLevel:1, maxLevel:1, passedLevels:{}, levelStars:{},
  difficulty:1,              // 0简单 1普通 2困难 3地狱
  comboPass:0, comboFail:0,  // 动态难度
  /* 外观 */
  curSkin:0, unlockedSkins:{0:true},
  curBoard:0, unlockedBoards:{0:true},
  curFx:0, unlockedFx:{0:true},
  curAudio:0, unlockedAudios:{0:true},
  curFrame:0, unlockedFrames:{0:true},
  /* 段位 */
  totalPass:0, rankIdx:0,
  /* 道具 */
  items:{undo:3, hint:3, bomb:2, refresh:1, stepUp:2, timeUp:2, skip:1, oneKill:0},
  /* 每日 */
  taskDate:'', tasks:null, signDays:0, signDate:'',
  dailyUltimateDone:false, dailyUltimateDate:'', dailyUltimateStars:0,
  dailyFailCats:0,
  /* 无尽 */
  endlessBest:0,
  /* 成就 */
  achievements:{},
  /* 登录时间 用于离线收益 */
  lastOnline:0,
  offlineSpeed:1,
  /* 运行时 */
  step:0, board:null, cats:[], rows:4, cols:4, cellSize:70,
  blocks:[], portals:[], reverses:[], ices:[], locks:[], targets:[],
  animating:false, history:[],
  isDaily:false, guideShown:false,
  timer:null, timeLeft:0, stepLimit:0, timeLimit:0,
  lastInterstitial:0, noInterstitial:0,
  eggActive:false,
  /* 三消合成最高回合 */
  mergeBest:0,
  /* 三消棋盘是否扩展过 */
  mgExpanded:false,
  /* 首次进入合成游戏是否已看过玩法说明 */
  mgIntroShown:false
};

/* ================= 配置表 ================= */

/* 猫咪皮肤 - 30款 */
var SKINS = [
  // 普通 N
  {name:"橘猫",color:"#ffb074",price:0,rarity:"n",desc:"经典橘座"},
  {name:"白猫",color:"#ffffff",price:100,rarity:"n",desc:"纯白小仙"},
  {name:"黑猫",color:"#4a4a4a",price:100,rarity:"n",desc:"神秘守护"},
  {name:"灰猫",color:"#a0a0a0",price:100,rarity:"n",desc:"低调优雅"},
  {name:"奶牛猫",color:"#eeeeee",price:150,rarity:"n",desc:"傻白甜"},
  // 稀有 R
  {name:"英短",color:"#9fb4c4",price:300,rarity:"r",desc:"高冷贵族"},
  {name:"美短",color:"#b08968",price:300,rarity:"r",desc:"活泼运动"},
  {name:"狸花",color:"#a08870",price:400,rarity:"r",desc:"国猫之王"},
  {name:"三花",color:"#ffcc80",price:400,rarity:"r",desc:"吉祥福猫"},
  {name:"蓝猫",color:"#88a4b4",price:500,rarity:"r",desc:"忧郁绅士"},

  initAudio();
  if(!audioCtx) return;
  var t = audioCtx.currentTime;
  // 应用当前音效包的音调调整

/* ============================================================
 * 关卡生成器 - 逆向构造法 100%保证可解
 * 基本思路：
 * 1. 从空棋盘开始，反向"塞"猫咪
 * 2. 每塞一只都确保其沿朝向到边界的路径为空
 * 3. 反向塞的顺序天然对应一条通关路径
 * 4. 最后 BFS 验证3遍
 * ============================================================ */
function mkRand(seed){ return function(){ seed=(seed*9301+49297)%233280; return seed/233280; }; }

function buildSolvableLevel(lv, rows, cols, catNum, specialNum, blockNum, extraType){
  var rand = mkRand(lv*9301+49297+G.difficulty*1000);
  var specials = getUnlockedSpecials(lv);
  specialNum = Math.min(specialNum, specials.length, catNum);

  for(var attempt=0; attempt<30; attempt++){
    var board = [];
    for(var i=0;i<rows;i++){ board.push(new Array(cols).fill(null)); }

    // 先放固定障碍
    var blocks = [];
    var placedBlocks = 0;
    var blockTries = 0;
    while(placedBlocks<blockNum && blockTries<50){
      blockTries++;
      var br = Math.floor(rand()*rows);
      var bc = Math.floor(rand()*cols);
      if(board[br][bc]===null){
        board[br][bc] = 'BLOCK';
        blocks.push({r:br,c:bc});
        placedBlocks++;
      }
    }

    var cats = [];
    var ok = true;
    for(var n=0; n<catNum; n++){
      var dirs = ['up','down','left','right'];
      var dir = dirs[Math.floor(rand()*4)];
      var candidates = [];
      for(var r=0;r<rows;r++){
        for(var c=0;c<cols;c++){
          if(board[r][c]!==null) continue;
          // 检查从(r,c)沿dir到边界路径是否全空
          var tr=r, tc=c;
          var clear = true;
          while(true){
            var nr, nc;
            if(dir==='up'){ nr=tr-1; nc=tc; }
            else if(dir==='down'){ nr=tr+1; nc=tc; }
            else if(dir==='left'){ nr=tr; nc=tc-1; }
            else { nr=tr; nc=tc+1; }
            if(nr<0||nr>=rows||nc<0||nc>=cols) break;
            if(board[nr][nc]!==null){ clear=false; break; }
            tr=nr; tc=nc;
          }
          if(clear) candidates.push({r:r,c:c});
        }
      }
      if(candidates.length===0){ ok=false; break; }
      var pick = candidates[Math.floor(rand()*candidates.length)];
      var cat = {id:n, r:pick.r, c:pick.c, dir:dir, removed:false, special:null};
      board[pick.r][pick.c] = cat;
      cats.push(cat);
    }
    if(!ok || cats.length<catNum) continue;

    // 分配特殊
    if(specialNum>0){
      var idxs = [];
      for(var i=0;i<cats.length;i++) idxs.push(i);
      for(var i=idxs.length-1;i>0;i--){
        var j = Math.floor(rand()*(i+1));
        var tmp=idxs[i];idxs[i]=idxs[j];idxs[j]=tmp;
      }
      for(var i=0;i<specialNum;i++){
        cats[idxs[i]].special = specials[Math.floor(rand()*specials.length)];
      }
    }

    // 验证3次可解
    var verified = 0;
    for(var v=0; v<3; v++){
      if(verifySolvable(rows, cols, cats, blocks)) verified++;
    }
    if(verified>=3){
      return {rows:rows, cols:cols, cats:cats, blocks:blocks, extras:generateExtras(lv, rows, cols, rand, extraType)};
    }
  }
  // 兜底
  return {rows:rows, cols:cols, cats:[{id:0,r:0,c:0,dir:'up',removed:false,special:null}], blocks:[], extras:{}};
}

/* 生成额外机制元素 */
function generateExtras(lv, rows, cols, rand, type){
  var extras = {portals:[], reverses:[], ices:[], locks:[], targets:[]};
  // 可以根据关卡类型添加特殊格子（这里简化：仅部分关卡添加）
  return extras;
}

/* BFS 可解性验证 */
function verifySolvable(rows, cols, cats, blocks){
  var n = cats.length;
  if(n>14) return true; // 状态爆炸时信任反向构造
  function stateKey(board, alive){
    var s = alive.toString(36);
    for(var r=0;r<rows;r++){
      for(var c=0;c<cols;c++){
        s += (board[r][c]===null?'.':(board[r][c]==='B'?'B':board[r][c].toString(36)));
      }
    }
    return s;
  }
  function cloneBoard(b){
    var nb = [];
    for(var i=0;i<rows;i++) nb.push(b[i].slice());
    return nb;
  }
  var initBoard = [];
  for(var i=0;i<rows;i++) initBoard.push(new Array(cols).fill(null));
  if(blocks) blocks.forEach(function(b){ initBoard[b.r][b.c]='B'; });
  cats.forEach(function(c){ initBoard[c.r][c.c]=c.id; });
  var initAlive = (1<<n)-1;
  var visited = {};
  visited[stateKey(initBoard, initAlive)] = true;
  var queue = [{board:initBoard, alive:initAlive, depth:0}];
  var maxDepth = 25;
  var iter = 0;
  while(queue.length>0 && iter<30000){
    iter++;
    var cur = queue.shift();
    if(cur.alive===0) return true;
    if(cur.depth>=maxDepth) continue;
    for(var i=0;i<n;i++){
      if(!(cur.alive&(1<<i))) continue;
      var cr=-1,cc=-1;
      for(var r=0;r<rows&&cr===-1;r++){
        for(var c=0;c<cols;c++){
          if(cur.board[r][c]===i){ cr=r;cc=c;break; }
        }
      }
      if(cr===-1) continue;
      var dir = cats[i].dir;
      var dr=0, dc=0;
      if(dir==='up') dr=-1; else if(dir==='down') dr=1;
      else if(dir==='left') dc=-1; else dc=1;
      var nr=cr, nc=cc;
      var out=false;
      while(true){
        var tr=nr+dr, tc=nc+dc;
        if(tr<0||tr>=rows||tc<0||tc>=cols){ out=true; break; }
        if(cur.board[tr][tc]!==null) break;
        nr=tr; nc=tc;
      }
      var nb = cloneBoard(cur.board);
      nb[cr][cc] = null;
      var na = cur.alive;
      if(out){ na &= ~(1<<i); }
      else { nb[nr][nc] = i; }
      var k = stateKey(nb, na);
      if(!visited[k]){
        visited[k] = true;
        queue.push({board:nb, alive:na, depth:cur.depth+1});
      }
    }
  }
  return false;
}

/* 关卡配置（7阶段 120关） */
/* ================= 关卡难度配置 =================
 * 设计原则：
 * - 第1关：极简新手友好（2只猫 4x4 无障碍）
 * - 第2关开始：断崖式上升（5x5 5只猫 带障碍 有步数限制）
 * - 目标：高难度+步数/时间限制 → 提高失败率 → 广告复活转化
 */
function getLevelConfig(lv){
  var rows, cols, catNum, specialNum=0, blockNum=0;
  var mul = DIFFICULTIES[G.difficulty].catMul;
  if(G.comboPass>=3) mul*=1.1;
  if(G.comboFail>=2) mul*=.9;

  // === 第1关：新手教学（稍有挑战）===
  if(lv===1){
    return {rows:4, cols:4, catNum:3, specialNum:0, blockNum:0};
  }
  // === 第2-5关：快速升温 ===
  if(lv<=5){
    rows=cols=5;
    catNum = 5+lv;           // 第2关7只 第3关8只 第4关9只 第5关10只
    blockNum = 1+Math.floor(lv/3);  // 1-2个障碍
    specialNum = lv>=3?1:0;  // 第3关起有特殊
  }
  // === 第6-15关：稳步提升 ===
  else if(lv<=15){
    rows=cols=5;
    catNum = 8+Math.floor((lv-5)*.5);  // 8-13只 (5x5最多15)
    blockNum = 1+Math.floor((lv-5)/5);  // 1-3个
    specialNum = 1+Math.floor((lv-5)/4);
  }
  // === 第16-30关：进阶 ===
  else if(lv<=30){
    rows=cols=6;
    catNum = 12+Math.floor((lv-15)*.5);
    blockNum = 2+Math.floor((lv-15)/8);
    specialNum = 2+Math.floor((lv-15)/6);
  }
  // === 第31-50关：高手 ===
  else if(lv<=50){
    rows=cols=6;
    catNum = 16+Math.floor((lv-30)*.4);
    blockNum = 2+Math.floor((lv-30)/10);
    specialNum = 3;
  }
  // === 第51-80关：大师 ===
  else if(lv<=80){
    rows=cols=7;
    catNum = 18+Math.floor((lv-50)*.4);
    blockNum = 3+Math.floor((lv-50)/15);
    specialNum = 4;
  }
  // === 第81-100关：专家 ===
  else if(lv<=100){
    rows=cols=7;
    catNum = 22+Math.floor((lv-80)*.3);
    blockNum = 3;
    specialNum = 5;
  }
  else {
    rows=cols=7;
    catNum = 26+Math.floor((lv-100)*.2);
    blockNum = 4;
    specialNum = 5;
  }

  catNum = Math.round(catNum*mul);
  // 限制猫密度不超过可用格子的 60% 防止生成失败
  var maxCats = Math.floor((rows*cols-blockNum)*0.6);
  catNum = Math.max(3, Math.min(catNum, maxCats));
  return {rows:rows, cols:cols, catNum:catNum, specialNum:specialNum, blockNum:blockNum};
}

function genLevel(lv){
  var cfg = getLevelConfig(lv);
  return buildSolvableLevel(lv, cfg.rows, cfg.cols, cfg.catNum, cfg.specialNum, cfg.blockNum);
}

/* ================= 创建猫咪DOM ================= */
/* 新设计：头在上(前)、身体在中、尾巴在下(后)
 * 整个猫咪通过 --r 变量旋转到4个朝向
 * up=0deg down=180deg right=90deg left=-90deg
 * 旋转后头部始终指向朝向方向 玩家一眼可辨
 */
function createCatEl(cat, skinIdx){
  var skin = SKINS[skinIdx||0];
  var el = document.createElement('div');
  // 加上稀有度 class 用于 SR/SSR 特效
  var rareClass = skin.rarity ? ' rare-'+skin.rarity : '';
  el.className = 'cat idle dir-'+cat.dir+rareClass;
  el.dataset.id = cat.id;
  var rot = {up:0, right:90, down:180, left:-90}[cat.dir];
  // 设置皮肤色和旋转角度变量
  el.style.setProperty('--cc', skin.color);
  el.style.setProperty('--r', rot+'deg');
  var specialHtml = cat.special ? '<div class="cSpecial '+cat.special+'"></div>' : '';
  el.innerHTML =
    '<div class="catWrap">'+
      '<div class="cTail"></div>'+            /* 尾巴 最底层 在身体后面 */
      '<div class="cBody"></div>'+            /* 身体 椭圆 */
      '<div class="cPawL"></div>'+            /* 左前爪 */
      '<div class="cPawR"></div>'+            /* 右前爪 */
      '<div class="cHead"></div>'+            /* 头部 大圆 */
      '<div class="cEarL"></div>'+            /* 左耳 */
      '<div class="cEarR"></div>'+            /* 右耳 */
      '<div class="cEyeL"></div>'+            /* 左眼 */
      '<div class="cEyeR"></div>'+            /* 右眼 */
      '<div class="cCheekL"></div>'+          /* 左腮红 */
      '<div class="cCheekR"></div>'+          /* 右腮红 */
      '<div class="cNose"></div>'+            /* 鼻子 */
      '<div class="cMouth"></div>'+           /* 嘴巴 */
      '<div class="cArrow"></div>'+           /* 红色朝向箭头 在头顶前方 */
      specialHtml+
    '</div>';
  return el;
}

/* ================= 开始关卡 ================= */
function startLevel(lv){
  G.curLevel = lv;
  G.step = 0;
  G.history = [];
  G.animating = false;
  if(G.timer){ clearInterval(G.timer); G.timer=null; }
  var data = genLevel(lv);
  G.rows = data.rows;
  G.cols = data.cols;
  G.cats = data.cats.map(function(c){return {id:c.id,r:c.r,c:c.c,dir:c.dir,special:c.special,removed:false,reviveUsed:false}});
  G.blocks = data.blocks || [];
  G.board = [];
  for(var i=0;i<G.rows;i++){ G.board.push(new Array(G.cols).fill(null)); }
  G.blocks.forEach(function(b){ G.board[b.r][b.c]='BLOCK'; });
  G.cats.forEach(function(c){ G.board[c.r][c.c]=c; });

  // 步数/时间限制（更有挑战性）
  G.stepLimit = 0; G.timeLimit = 0;
  if(G.isDaily){
    G.timeLimit = 60;
    G.stepLimit = Math.ceil(G.cats.length*1.2);
  } else if(lv===1){
    // 第1关：宽松但有步数限制
    G.stepLimit = 8;
  } else if(lv>=2){
    // 第2关起：严格步数（猫数×1.3 向上取整）
    G.stepLimit = Math.ceil(G.cats.length*1.3);
    // 每3关一个限时关（第3/6/9/12...）更有压力
    if(lv%3===0) G.timeLimit = Math.max(25, G.cats.length*3);
  }

  renderBoard();
  document.getElementById('curLevelText').textContent = G.isDaily?'🔥 今日终极':('第 '+lv+' 关');
  updateInfo();
  updateDiffDisplay();
  if(lv===1 && !G.guideShown){ showGuide(); }
  if(G.timeLimit>0){
    G.timeLeft = G.timeLimit;
    document.getElementById('timerWrap').style.display = 'block';
    G.timer = setInterval(function(){
      G.timeLeft--;
      var t = document.getElementById('timerText');
      t.textContent = '⏱ '+G.timeLeft+'s';
      if(G.timeLeft<=5) t.classList.add('danger'); else t.classList.remove('danger');
      if(G.timeLeft<=0){ clearInterval(G.timer); G.timer=null; showFailModal('time'); }
    },1000);
  } else {
    document.getElementById('timerWrap').style.display = 'none';
  }
}

function updateDiffDisplay(){
  var el = document.getElementById('modeDisplay');
  if(G.stepLimit>0) el.innerHTML = '👣 限'+G.stepLimit+'步';
  else if(G.timeLimit>0) el.innerHTML = '⏱ 限时';
  else el.innerHTML = DIFFICULTIES[G.difficulty].name;
}

/* ================= 每日终极挑战 =================
 * 设计：全服统一关卡 用日期作种子
 * 难度：6x6 + 12只猫 + 2障碍 + 2特殊 (保证可解 但难度高)
 */
/* 主菜单"开始游戏"入口：从应该玩的关卡开始（不会落到 9xxx 终极挑战号） */
function startGameNormal(){
  G.isDaily = false;
  // 如果当前 curLevel 是终极挑战的大编号 重置回正常关卡
  if(G.curLevel>200) G.curLevel = G.maxLevel<=120?G.maxLevel:1;
  if(G.curLevel<1) G.curLevel = 1;
  goScreen('gameScreen');
  startLevel(G.curLevel);
}

function startDailyUltimate(){
  var today = getTodayStr();
  if(G.dailyUltimateDate===today && G.dailyUltimateDone){
    toast("今日终极挑战已通关 明日再战");
    return;
  }
  G.dailyUltimateDate = today;
  G.isDaily = true;
  goScreen('gameScreen');
  // 不调用 startLevel(9xxx) 避免落入 lv>100 配置
  // 而是直接构造一个专属的终极挑战关卡
  buildDailyUltimateLevel();
  toast("🔥 今日终极挑战 · 全服统一关卡");
}

/* 构造每日终极挑战专属关卡 */
function buildDailyUltimateLevel(){
  G.step = 0;
  G.history = [];
  G.animating = false;
  if(G.timer){ clearInterval(G.timer); G.timer=null; }

  // 用今日日期作为固定种子
  var today = getTodayStr();
  var dateSeed = parseInt(today.split('-').join(''));
  // 暂时把 difficulty 设为 0 调用关卡生成（避免难度倍率干扰）
  var savedDiff = G.difficulty;
  G.difficulty = 0;
  // 使用 dateSeed 作为关卡号生成 (落入 6x6 区间)
  // 直接调用 buildSolvableLevel 自定义参数
  var data = buildSolvableLevel(dateSeed%9999, 6, 6, 12, 2, 2);
  G.difficulty = savedDiff;

  G.rows = 6;
  G.cols = 6;
  G.cats = data.cats.map(function(c){return {id:c.id,r:c.r,c:c.c,dir:c.dir,special:c.special,removed:false,reviveUsed:false}});
  G.blocks = data.blocks || [];
  G.board = [];
  for(var i=0;i<G.rows;i++){ G.board.push(new Array(G.cols).fill(null)); }
  G.blocks.forEach(function(b){ G.board[b.r][b.c]='BLOCK'; });
  G.cats.forEach(function(c){ G.board[c.r][c.c]=c; });

  // 终极挑战限制：60秒 + 严格步数(猫咪数*1.3)
  G.timeLimit = 60;
  G.stepLimit = Math.ceil(G.cats.length*1.3);
  G.timeLeft = 60;

  renderBoard();
  document.getElementById('curLevelText').textContent = '🔥 今日终极';
  updateInfo();
  updateDiffDisplay();

  // 启动倒计时
  document.getElementById('timerWrap').style.display = 'block';
  G.timer = setInterval(function(){
    G.timeLeft--;
    var t = document.getElementById('timerText');
    t.textContent = '⏱ '+G.timeLeft+'s';
    if(G.timeLeft<=5) t.classList.add('danger'); else t.classList.remove('danger');
    if(G.timeLeft<=0){ clearInterval(G.timer); G.timer=null; showFailModal('time'); }
  },1000);
}

/* ================= 渲染棋盘（统一函数 普通+无尽都用） ================= 
 * 关键改进：基于"可用宽度+可用高度"双约束计算 cellSize
 * 不再让棋盘溢出屏幕
 */
function renderBoardCore(boardId){
  var board = document.getElementById(boardId);
  if(!board) return;

  // 计算可用区域：boardWrap 的实际尺寸
  var wrap = board.parentElement;
  var wrapRect = wrap.getBoundingClientRect();

  // 如果 boardWrap 还没布局完成（高度为0），用 RAF 延迟重试
  if(wrapRect.height < 100 || wrapRect.width < 100){
    requestAnimationFrame(function(){ renderBoardCore(boardId); });
    return;
  }

  board.innerHTML = '';
  // 猫多时关闭CSS动画防卡
  var catCount = G.cats ? G.cats.filter(function(c){return !c.removed}).length : 0;
  if(catCount > 8) board.classList.add('no-anim');
  else board.classList.remove('no-anim');
  // 减去 boardInfo 的高度 + padding
  var infoH = 38;  // boardInfo 大约 38px (含 margin)
  var availH = Math.max(200, wrapRect.height - infoH - 20);
  var availW = Math.max(200, wrapRect.width - 20);

  // 基于宽高双约束 取小值 (PAD=14 给边缘猫装饰留空间)
  var PAD = 14;
  var cellByW = Math.floor((availW - PAD*2) / G.cols);
  var cellByH = Math.floor((availH - PAD*2) / G.rows);
  G.cellSize = Math.max(38, Math.min(cellByW, cellByH, 80));

  var boardW = G.cellSize*G.cols + PAD*2;
  var boardH = G.cellSize*G.rows + PAD*2;
  board.style.width = boardW+'px';
  board.style.height = boardH+'px';
  board.style.background = BOARDS[G.curBoard].bg;
  board.style.position = 'relative';
  board.style.borderRadius = '22px';
  board.style.border = '3px solid rgba(255,255,255,.8)';
  board.style.boxShadow = '0 10px 30px rgba(255,140,107,.15),0 4px 12px rgba(0,0,0,.08),inset 0 2px 6px rgba(255,255,255,.9)';
  board.style.margin = '0 auto';

  for(var r=0;r<G.rows;r++){
    for(var c=0;c<G.cols;c++){
      var cell = document.createElement('div');
      cell.className='cell';
      if(G.board[r][c]==='BLOCK') cell.className += ' block';
      cell.style.width=G.cellSize+'px';
      cell.style.height=G.cellSize+'px';
      cell.style.left=(c*G.cellSize+PAD)+'px';
      cell.style.top=(r*G.cellSize+PAD)+'px';
      board.appendChild(cell);
    }
  }
  G.cats.forEach(function(cat){
    if(cat.removed) return;
    var el = createCatEl(cat, G.curSkin);
    el.style.width = G.cellSize+'px';
    el.style.height = G.cellSize+'px';
    el.style.left = (cat.c*G.cellSize+PAD)+'px';
    el.style.top = (cat.r*G.cellSize+PAD)+'px';
    bindCatInput(el, cat.id);
    board.appendChild(el);
  });
}

function renderBoard(){
  renderBoardCore('gameBoard');
}

/* ================= 触摸/点击输入 - 0延迟丝滑版 ================= */
function bindCatInput(el, catId){
  // 用 touchstart 优先响应 并阻止默认 避免300ms延迟
  var startX=0,startY=0,triggered=false;
  function trigger(){
    if(triggered) return;
    triggered = true;
    onCatClick(catId);
  }
  // 手机触摸事件 - 0延迟响应
  el.addEventListener('touchstart',function(e){
    e.preventDefault();
    e.stopPropagation();
    var t = e.touches[0];
    startX = t.clientX; startY = t.clientY; triggered=false;
    el.classList.add('squish');
    playSound('click');
    vibrate(15);
  },{passive:false});
  el.addEventListener('touchmove',function(e){
    if(triggered) return;
    var t = e.touches[0];
    var dx = t.clientX-startX, dy = t.clientY-startY;
    if(Math.abs(dx)>5 || Math.abs(dy)>5) trigger();
  },{passive:true});
  el.addEventListener('touchend',function(e){
    e.preventDefault();
    setTimeout(function(){el.classList.remove('squish')},200);
    if(!triggered) trigger();
  },{passive:false});
  // PC 端鼠标事件
  el.addEventListener('mousedown',function(e){
    if(e.pointerType==='touch') return;
    triggered=false;
    el.classList.add('squish');
    playSound('click');
  });
  el.addEventListener('click',function(e){
    e.stopPropagation();
    setTimeout(function(){el.classList.remove('squish')},200);
    if(!triggered){ triggered=true; onCatClick(catId); }
  });
}

/* ================= 猫咪移动核心 ================= */
/* 获取当前棋盘元素 */
function getActiveBoard(){
  return document.getElementById('gameBoard');
}
function onCatClick(catId){
  if(G.animating) return;
  var cat = G.cats.find(function(c){return c.id===catId && !c.removed});
  if(!cat) return;
  G.animating = true;
  playSound('slide');
  vibrate(20);
  G.history.push({id:cat.id,r:cat.r,c:cat.c});
  if(G.history.length>20) G.history.shift();

  var dr=0,dc=0;
  if(cat.dir==='up') dr=-1; else if(cat.dir==='down') dr=1;
  else if(cat.dir==='left') dc=-1; else dc=1;

  var el = document.querySelector('.cat[data-id="'+catId+'"]');

  // 特殊猫咪分支
  if(cat.special==='rainbow'){ handleRainbow(cat, dr, dc); return; }
  if(cat.special==='magnet'){ handleMagnet(cat, dr, dc); return; }

  G.board[cat.r][cat.c] = null;
  var nr=cat.r, nc=cat.c;
  var blockedBy = null;
  while(true){
    var tr=nr+dr, tc=nc+dc;
    if(tr<0||tr>=G.rows||tc<0||tc>=G.cols) break;
    if(G.board[tr][tc]!==null){ blockedBy=G.board[tr][tc]; break; }
    nr=tr; nc=tc;
  }
  var canOut = (blockedBy===null);
  var chainCat = (blockedBy && blockedBy!=='BLOCK' && blockedBy.dir===cat.dir) ? blockedBy : null;

  // 炸弹猫
  if(cat.special==='bomb' && blockedBy && blockedBy!=='BLOCK'){
    playSound('bomb');
    var victim = blockedBy;
    G.board[victim.r][victim.c] = null;
    victim.removed = true;
    var vel = document.querySelector('.cat[data-id="'+victim.id+'"]');
    if(vel){ vel.classList.add('removing'); setTimeout(function(){if(vel.parentNode)vel.parentNode.removeChild(vel)},500); }
    explodeFx(victim.r, victim.c);
    canOut = true;
    nr = cat.r; nc = cat.c;
    while(true){
      var tr=nr+dr, tc=nc+dc;
      if(tr<0||tr>=G.rows||tc<0||tc>=G.cols) break;
      if(G.board[tr][tc]!==null) break;
      nr=tr; nc=tc;
    }
  }

  // 复活猫
  if(cat.special==='revive' && !canOut && !cat.reviveUsed){
    G.board[cat.r][cat.c] = cat;
    G.animating = false;
    if(el) el.classList.remove('squish');
    showModal("✨ 复活猫·穿墙","这只复活猫被挡住了<br>观看广告可穿墙滑出",[
      {text:"看广告穿墙",cls:"green",cb:function(){
        /* ========== 广告接口：复活猫穿墙 ========== */
        showAdReward(function(){
          cat.reviveUsed = true;
          closeModal();
          G.animating = true;
          G.board[cat.r][cat.c] = null;
          cat.removed = true;
          if(el){
            var outR,outC;
            if(dr<0){outR=-1;outC=cat.c}else if(dr>0){outR=G.rows;outC=cat.c}
            else if(dc<0){outR=cat.r;outC=-1}else{outR=cat.r;outC=G.cols}
            el.classList.add('launch');
            el.style.left = (outC*G.cellSize+14)+'px';
            el.style.top = (outR*G.cellSize+14)+'px';
            setTimeout(function(){
              el.classList.add('removing');
              setTimeout(function(){if(el.parentNode)el.parentNode.removeChild(el)},300);
            },200);
          }
          playSound('revive');
          G.coin += 5; updateCoinDisplay(); spawnCoinFly();
          setTimeout(function(){ G.animating=false; updateInfo(); checkWin(); },200);
        });
      }},
      {text:"重试",cls:"pink",cb:closeModal}
    ]);
    return;
  }

  if(canOut){
    cat.removed = true;
    var outR, outC;
    if(dr<0){ outR=-1; outC=cat.c; } else if(dr>0){ outR=G.rows; outC=cat.c; }
    else if(dc<0){ outR=cat.r; outC=-1; } else { outR=cat.r; outC=G.cols; }
    if(el){
      el.classList.add('launch');
      el.style.left = (outC*G.cellSize+14)+'px';
      el.style.top = (outR*G.cellSize+14)+'px';
      spawnTrail(el, dr, dc);
      setTimeout(function(){
        el.classList.add('removing');
        setTimeout(function(){if(el.parentNode)el.parentNode.removeChild(el)},300);
      },200);
    }
    playSound('meow');
    G.coin += 2;
    updateCoinDisplay();
    spawnCoinFly();
  } else if(chainCat){
    playSound('chain');
    handleChainSlide(cat, chainCat, dr, dc);
    return;
  } else {
    cat.r=nr; cat.c=nc;
    G.board[nr][nc] = cat;
    if(el){
      el.style.left = (nc*G.cellSize+14)+'px';
      el.style.top = (nr*G.cellSize+14)+'px';
      spawnTrail(el, dr, dc);
    }
  }
  G.step++;
  updateInfo();
  setTimeout(function(){
    G.animating = false;
    if(el){ el.classList.remove('squish','launch'); el.classList.add('idle'); }
    // 检查步数限制
    if(G.stepLimit>0 && G.step>=G.stepLimit){
      var left = G.cats.filter(function(c){return !c.removed}).length;
      if(left>0){ showFailModal('step'); return; }
    }
    checkWin();
  },150);
  if(!G.guideShown){ G.guideShown=true; saveData(); document.getElementById('guide').classList.remove('active'); }
}

/* 连锁滑动 */
function handleChainSlide(cat1, cat2, dr, dc){
  G.board[cat2.r][cat2.c] = null;
  var n2r=cat2.r, n2c=cat2.c;
  var out2 = false;
  while(true){
    var tr=n2r+dr, tc=n2c+dc;
    if(tr<0||tr>=G.rows||tc<0||tc>=G.cols){ out2=true; break; }
    if(G.board[tr][tc]!==null) break;
    n2r=tr; n2c=tc;
  }
  var el2 = document.querySelector('.cat[data-id="'+cat2.id+'"]');
  if(out2){
    cat2.removed = true;
    var oR,oC;
    if(dr<0){oR=-1;oC=cat2.c}else if(dr>0){oR=G.rows;oC=cat2.c}
    else if(dc<0){oR=cat2.r;oC=-1}else{oR=cat2.r;oC=G.cols}
    if(el2){
      el2.classList.add('launch');
      el2.style.left = (oC*G.cellSize+14)+'px';
      el2.style.top = (oR*G.cellSize+14)+'px';
      setTimeout(function(){el2.classList.add('removing');setTimeout(function(){if(el2.parentNode)el2.parentNode.removeChild(el2)},300)},200);
    }
    G.coin += 2;
  } else {
    cat2.r=n2r; cat2.c=n2c;
    G.board[n2r][n2c] = cat2;
    if(el2){ el2.style.left=(n2c*G.cellSize+14)+'px'; el2.style.top=(n2r*G.cellSize+14)+'px'; }
  }

  G.board[cat1.r][cat1.c] = null;
  var n1r=cat1.r, n1c=cat1.c;
  var out1 = false;
  while(true){
    var tr=n1r+dr, tc=n1c+dc;
    if(tr<0||tr>=G.rows||tc<0||tc>=G.cols){ out1=true; break; }
    if(G.board[tr][tc]!==null) break;
    n1r=tr; n1c=tc;
  }
  var el1 = document.querySelector('.cat[data-id="'+cat1.id+'"]');
  if(out1){
    cat1.removed = true;
    var oR,oC;
    if(dr<0){oR=-1;oC=cat1.c}else if(dr>0){oR=G.rows;oC=cat1.c}
    else if(dc<0){oR=cat1.r;oC=-1}else{oR=cat1.r;oC=G.cols}
    if(el1){
      el1.classList.add('launch');
      el1.style.left = (oC*G.cellSize+14)+'px';
      el1.style.top = (oR*G.cellSize+14)+'px';
      setTimeout(function(){el1.classList.add('removing');setTimeout(function(){if(el1.parentNode)el1.parentNode.removeChild(el1)},300)},200);
    }
    G.coin += 3;
  } else {
    cat1.r=n1r; cat1.c=n1c;
    G.board[n1r][n1c] = cat1;
    if(el1){ el1.style.left=(n1c*G.cellSize+14)+'px'; el1.style.top=(n1r*G.cellSize+14)+'px'; }
  }
  // 连锁全屏特效
  chainFx();
  updateCoinDisplay();
  spawnCoinFly();
  G.step++;
  updateInfo();
  setTimeout(function(){
    G.animating = false;
    if(el1){ el1.classList.remove('squish','launch'); el1.classList.add('idle'); }
    checkWin();
  },300);
}

/* 彩虹猫 */
function handleRainbow(cat, dr, dc){
  playSound('rainbow');
  G.board[cat.r][cat.c] = null;
  var affected = [];
  var nr=cat.r+dr, nc=cat.c+dc;
  while(nr>=0&&nr<G.rows&&nc>=0&&nc<G.cols){
    if(G.board[nr][nc]!==null && G.board[nr][nc]!=='BLOCK') affected.push(G.board[nr][nc]);
    nr+=dr; nc+=dc;
  }
  affected.forEach(function(c){
    c.dir = cat.dir;
    var e = document.querySelector('.cat[data-id="'+c.id+'"]');
    if(e){
      // 新结构：通过 --r 变量和 dir-xxx class 控制朝向
      e.className = e.className.replace(/dir-\w+/,'dir-'+cat.dir);
      var rot = {up:0, right:90, down:180, left:-90}[cat.dir];
      e.style.setProperty('--r', rot+'deg');
    }
  });
  cat.removed = true;
  var el = document.querySelector('.cat[data-id="'+cat.id+'"]');
  if(el){
    var outR,outC;
    if(dr<0){outR=-1;outC=cat.c}else if(dr>0){outR=G.rows;outC=cat.c}
    else if(dc<0){outR=cat.r;outC=-1}else{outR=cat.r;outC=G.cols}
    el.style.left = (outC*G.cellSize+14)+'px';
    el.style.top = (outR*G.cellSize+14)+'px';
    setTimeout(function(){el.classList.add('removing');setTimeout(function(){if(el.parentNode)el.parentNode.removeChild(el)},300)},200);
  }
  rainbowFx(cat.r, cat.c);
  G.coin += 5;
  updateCoinDisplay();
  spawnCoinFly();
  G.step++;
  updateInfo();
  setTimeout(function(){ G.animating=false; checkWin(); },180);
}

/* 磁铁猫 */
function handleMagnet(cat, dr, dc){
  playSound('magnet');
  var line = [cat];
  G.board[cat.r][cat.c] = null;
  var nr=cat.r+dr, nc=cat.c+dc;
  while(nr>=0&&nr<G.rows&&nc>=0&&nc<G.cols){
    if(G.board[nr][nc]!==null && G.board[nr][nc]!=='BLOCK'){
      line.push(G.board[nr][nc]);
      G.board[nr][nc] = null;
    }
    nr+=dr; nc+=dc;
  }
  // 每只猫向前推1格
  line.forEach(function(c){
    var newR = c.r+dr, newC = c.c+dc;
    if(newR<0||newR>=G.rows||newC<0||newC>=G.cols){
      c.removed = true;
      var el = document.querySelector('.cat[data-id="'+c.id+'"]');
      if(el){
        el.style.left=(newC*G.cellSize+14)+'px';
        el.style.top=(newR*G.cellSize+14)+'px';
        setTimeout(function(){el.classList.add('removing');setTimeout(function(){if(el.parentNode)el.parentNode.removeChild(el)},300)},200);
      }
      G.coin += 2;
    } else if(G.board[newR][newC]===null){
      c.r = newR; c.c = newC;
      G.board[newR][newC] = c;
      var el = document.querySelector('.cat[data-id="'+c.id+'"]');
      if(el){ el.style.left=(newC*G.cellSize+14)+'px'; el.style.top=(newR*G.cellSize+14)+'px'; }
    } else {
      // 位置被占 放回原处
      G.board[c.r][c.c] = c;
    }
  });
  updateCoinDisplay();
  spawnCoinFly();
  G.step++;
  updateInfo();
  setTimeout(function(){ G.animating=false; checkWin(); },180);
}

/* ================= 界面更新 ================= */
function updateInfo(){

  var left = G.cats.filter(function(c){return !c.removed}).length;
  document.getElementById('catLeft').textContent = left;

/* 通关检测 */
function checkWin(){
  var left = G.cats.filter(function(c){return !c.removed}).length;

  // ========== 普通关卡通关 ==========
  if(left===0){
    if(G.timer){ clearInterval(G.timer); G.timer=null; }
    document.querySelectorAll('#gameBoard .cat').forEach(function(c){c.classList.add('cheer')});
    var baseReward = 8+G.curLevel*2;
    var mul = DIFFICULTIES[G.difficulty].coinMul;
    var reward = Math.floor(baseReward*mul);
    var star = calcStar();
    if(star>=3) reward *= 2;
    if(G.isDaily){
      G.dailyUltimateDone = true;
      G.dailyUltimateStars = star;
      reward *= 3;
    }
    G.coin += reward;
    G.totalPass++;
    G.comboPass++;
    G.comboFail = 0;
    if(!G.isDaily){
      if(!G.passedLevels[G.curLevel]) G.passedLevels[G.curLevel] = true;
      if(G.curLevel>=G.maxLevel) G.maxLevel = G.curLevel+1;
      if(!G.levelStars[G.curLevel] || G.levelStars[G.curLevel]<star) G.levelStars[G.curLevel] = star;
    }
    checkRankUp();
    checkAchievements();
    updateTaskProgress('pass', 1);
    saveData();
    updateCoinDisplay();
    playSound('win');
    vibrate([50,30,50,30,80]);
    fireworks();
    setTimeout(function(){ showWinModal(reward, star); },800);
  }
}

function calcStar(){
  // 按步数和剩余时间计算
  var base = G.cats.length;
  if(G.step<=base) return 3;
  if(G.step<=base*1.5) return 2;
  return 1;
}

function checkRankUp(){
  for(var i=RANKS.length-1;i>=0;i--){
    if(G.totalPass>=RANKS[i].need){
      if(i>G.rankIdx){
        G.rankIdx = i;
        playSound('rankup');
        setTimeout(function(){ toast("🎉 段位晋升 "+RANKS[i].emoji+" "+RANKS[i].name); },500);
        showInterstitialAd();
      }
      break;
    }
  }
}

function checkAchievements(){
  ACHIEVEMENTS.forEach(function(a){
    if(!G.achievements[a.id] && a.check()){
      G.achievements[a.id] = true;
      G.coin += a.reward;
      setTimeout(function(){ toast("🏆 成就解锁 "+a.name+" +"+a.reward); },800);
    }
  });
}

function showWinModal(reward, star){
  var stars = '';
  for(var i=0;i<3;i++) stars += i<star?'⭐':'☆';
  var isDailyWin = G.isDaily;  // 缓存 避免后续 closeModal 异步问题
  var title = isDailyWin ? "🔥 终极挑战通关!" : "🎉 通关成功!";
  var text = stars+"<br>步数: "+G.step+"<br>获得: <b style='color:#ff6b4a;font-size:18px'>"+reward+"</b> 🐾";
  if(isDailyWin) text += "<br><b style='color:#ff3b30'>全服仅0.38%玩家完成</b><br>击败99.62%的玩家";
  var btns;
  if(isDailyWin){
    // 终极挑战通关：清理状态 返回主页
    btns = [
      {text:"返回主页",cls:"",cb:function(){
        G.isDaily=false;
        closeModal();
        goScreen('mainMenu');
      }},
      {text:"双倍金币💎",cls:"green",cb:function(){
        /* ========== 广告接口：终极挑战双倍 ========== */
        showAdReward(function(){
          G.coin += reward; updateCoinDisplay(); saveData();
          spawnCoinFly(); G.isDaily=false; closeModal();
          setTimeout(function(){ goScreen('mainMenu'); },500);
        });
      }},
      {text:"分享海报",cls:"pink",cb:function(){ sharePoster(); }}
    ];
  } else {
    // 普通关卡通关：进入下一关
    btns = [
      {text:"下一关",cls:"",cb:function(){
        closeModal();
        startLevel(G.curLevel+1);
      }},
      {text:"双倍金币💎",cls:"green",cb:function(){
        /* ========== 广告接口1：通关双倍金币 ========== */
        showAdReward(function(){
          G.coin += reward; updateCoinDisplay(); saveData();
          spawnCoinFly(); closeModal();
          setTimeout(function(){ startLevel(G.curLevel+1); },500);
        });
      }},
      {text:"分享海报",cls:"pink",cb:function(){ sharePoster(); }}
    ];
  }
  showModal(title, text, btns);
}

/* 失败弹窗（步数/时间） */

function showAdReward(cb){
  /* 小白替换位置：将整个函数体替换为官方SDK调用
   * 微信小游戏：
   *   var ad = wx.createRewardedVideoAd({adUnitId:'你的广告位ID'});
   *   ad.show().catch(function(){ad.load().then(function(){ad.show()})});

/* ========== 广告接口：插屏广告 ========== */
function showInterstitialAd(){
  /* 触发时机：每通关10关 或 段位晋升后
   * 频率：15分钟最多1次
   * 微信：wx.createInterstitialAd({adUnitId:'你的广告位ID'}).show()
   * 抖音：tt.createInterstitialAd({adUnitId:'你的广告位ID'}).show()

  G.lastInterstitial = now;
  console.log("[插屏广告] 触发");
}

/* ================= 道具使用 ================= */
function useItem(type){
  if(G.animating) return;
  if(type==='undo'){

function bombFirst(){
  var alive = G.cats.filter(function(c){return !c.removed});
  if(alive.length===0) return;
  var target = alive[0];
  target.removed = true;
  G.board[target.r][target.c] = null;
  var el = document.querySelector('.cat[data-id="'+target.id+'"]');
  if(el){ el.classList.add('removing'); setTimeout(function(){if(el.parentNode)el.parentNode.removeChild(el)},300); }
  explodeFx(target.r, target.c);
  playSound('bomb');
  updateInfo();
  setTimeout(checkWin,400);
}

/* ================= Toast / Modal ================= */
function toast(text){
  var t = document.createElement('div');
  t.className='toast';
  t.innerHTML = text;
  document.body.appendChild(t);
  setTimeout(function(){ t.style.opacity='0';t.style.transition='opacity .4s'; },1400);
  setTimeout(function(){if(t.parentNode)t.parentNode.removeChild(t)},1850);
}

function showModal(title,text,btns){
  document.getElementById('modalTitle').innerHTML=title;
  document.getElementById('modalText').innerHTML=text;
  var bc = document.getElementById('modalBtns');
  bc.innerHTML='';
  btns.forEach(function(b){
    var btn = document.createElement('button');
    btn.className = 'btn small '+(b.cls||'');
    btn.textContent = b.text;
    btn.onclick = b.cb;
    bc.appendChild(btn);
  });
  document.getElementById('modal').classList.add('active');
}
function closeModal(){ document.getElementById('modal').classList.remove('active'); }

function showGuide(){
  var g = document.getElementById('guide');

var curSkinTab = 'cat';
function switchSkinTab(type, el){
  curSkinTab = type;
  document.querySelectorAll('#skinScreen .tabItem').forEach(function(t){t.classList.remove('active')});
  el.classList.add('active');
  renderSkins();
}
function renderSkins(){
  var grid = document.getElementById('skinGrid');
  grid.innerHTML='';
  var data, unlocked, curKey;
  if(curSkinTab==='cat'){ data=SKINS; unlocked=G.unlockedSkins; curKey='curSkin'; }
  else if(curSkinTab==='board'){ data=BOARDS; unlocked=G.unlockedBoards; curKey='curBoard'; }
  else if(curSkinTab==='fx'){ data=FXES; unlocked=G.unlockedFx; curKey='curFx'; }
  else if(curSkinTab==='audio'){ data=AUDIOS; unlocked=G.unlockedAudios; curKey='curAudio'; }
  else { data=FRAMES; unlocked=G.unlockedFrames; curKey='curFrame'; }

  data.forEach(function(item,idx){
    var card = document.createElement('div');
    card.className='skinCard';
    var locked = !unlocked[idx];
    if(locked) card.className+=' locked';
    if(G[curKey]===idx) card.className+=' current';
    if(item.rarity) card.className+=' rarity-'+item.rarity;
    var rarityTag = item.rarity?'<span class="rarityTag '+item.rarity+'">'+item.rarity.toUpperCase()+'</span>':'';
    // 根据 tab 生成不同的预览
    var previewHtml;
    if(curSkinTab==='cat'){
      previewHtml = '<div class="skinPreview"></div>';
    } else if(curSkinTab==='board'){
      // 棋盘主题：显示该主题的实际背景色 + 模拟格子
      previewHtml = '<div class="skinPreview" style="background:'+item.bg+';border-radius:12px;padding:6px;display:grid;grid-template-columns:1fr 1fr;gap:3px">'+
        '<div style="background:rgba(255,255,255,.4);border-radius:4px"></div>'+
        '<div style="background:rgba(255,255,255,.4);border-radius:4px"></div>'+
        '<div style="background:rgba(255,255,255,.4);border-radius:4px"></div>'+
        '<div style="background:rgba(255,255,255,.4);border-radius:4px"></div>'+
        '</div>';
    } else if(curSkinTab==='fx'){
      // 特效：显示拖尾颜色小点
      var dotsHtml = '';
      (item.colors||[]).slice(0,5).forEach(function(c,i){
        dotsHtml += '<div style="width:12px;height:12px;border-radius:50%;background:'+c+';box-shadow:0 0 6px '+c+';transform:translate('+(i*8-16)+'px,'+(Math.sin(i)*8)+'px)"></div>';
      });
      previewHtml = '<div class="skinPreview" style="background:linear-gradient(145deg,#2d1b4e,#4a2d6e);border-radius:12px;display:flex;align-items:center;justify-content:center;gap:2px">'+dotsHtml+'</div>';
    } else if(curSkinTab==='audio'){
      // 音效：显示音调对应的音符高低
      var pitch = item.pitch||1;
      var note = pitch<.9?'🔈':pitch<1.1?'🔉':pitch<1.3?'🔊':'🎵';
      previewHtml = '<div class="skinPreview" style="background:linear-gradient(145deg,#ffe0c8,#ffb88c);border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center">'+
        '<div style="font-size:36px">'+note+'</div>'+
        '<div style="font-size:10px;color:#7a4a2a;font-weight:700;margin-top:-4px">音调 '+pitch.toFixed(1)+'x</div>'+
        '</div>';
    } else {
      // 头像框：显示实际边框效果
      previewHtml = '<div class="skinPreview" style="background:linear-gradient(145deg,#fff,#ffe8d6);border-radius:50%;display:flex;align-items:center;justify-content:center;'+
        'border:'+item.border+';box-shadow:'+(item.glow||'none')+'">'+
        '<div style="font-size:30px">🐱</div>'+
        '</div>';
    }
    card.innerHTML = rarityTag+
      '<div class="skinName">'+item.name+'</div>'+
      previewHtml+
      '<div class="skinDesc">'+(item.desc||'')+'</div>'+
      '<div class="skinPrice">'+(locked?('🐾 '+item.price):(G[curKey]===idx?'✅ 使用中':'已拥有'))+'</div>';
    if(curSkinTab==='cat'){
      var preview = card.querySelector('.skinPreview');
      var cat = createCatEl({dir:'up',id:-100-idx,special:null},idx);
      cat.style.width='70px';cat.style.height='70px';cat.style.position='relative';
      preview.appendChild(cat);
    }
    (function(idx,item){
      card.addEventListener('click',function(){
        if(unlocked[idx]){
          G[curKey] = idx; saveData(); renderSkins();
          toast("已切换 "+item.name);
          // 切换后应用效果到菜单：猫咪皮肤/头像框都会改变主菜单外观
          if(curSkinTab==='cat' || curSkinTab==='frame') initMenuCat();
          // 音效包：立即试听
          if(curSkinTab==='audio') playSound('win');
          // 特效：立即播放一个拖尾示意
          if(curSkinTab==='fx') playSound('coin');
        } else {
          showModal("🐱 解锁 "+item.name,"花费 "+item.price+" 🐾 解锁<br>或看广告免费解锁",[
            {text:"🐾 购买",cls:"",cb:function(){
              if(G.coin>=item.price){
                G.coin-=item.price; unlocked[idx]=true;
                saveData(); updateCoinDisplay(); closeModal(); renderSkins();
                toast("解锁成功");

            }},

              /* ========== 广告接口：稀有皮肤解锁 ========== */
              showAdReward(function(){
                unlocked[idx]=true; saveData(); closeModal(); renderSkins();
                toast("✅ 解锁成功");
              });
            }},
            {text:"取消",cls:"pink",cb:closeModal}
          ]);
        }
      });
    })(idx,item);
    grid.appendChild(card);
  });
}

function initTasks(){
  var today = getTodayStr();
  if(G.taskDate!==today || !G.tasks){
    G.taskDate = today;
    G.tasks = [
      {id:'pass3',name:'通关3个关卡',target:3,progress:0,reward:80,done:false,icon:'🎯'},
      {id:'pass5',name:'通关5个关卡',target:5,progress:0,reward:150,done:false,icon:'🏆'},
      {id:'pass10',name:'通关10个关卡',target:10,progress:0,reward:300,done:false,icon:'👑'},
      {id:'daily',name:'完成终极挑战',target:1,progress:0,reward:500,done:false,icon:'🔥'}
    ];
    saveData();
  }
}
function updateTaskProgress(type, n){
  if(!G.tasks) return;
  if(type==='pass'){
    G.tasks.forEach(function(t){
      if(t.id!=='daily' && !t.done){
        t.progress = Math.min(t.target, t.progress+n);
      }
      if(t.id==='daily' && G.isDaily && G.dailyUltimateDone && !t.done){
        t.progress = 1;
      }
    });
    saveData();
  }
}
function renderTasks(){
  initTasks();
  var list = document.getElementById('taskList');
  list.innerHTML='';
  G.tasks.forEach(function(t){
    var item = document.createElement('div');
    item.className='listItem';
    var canClaim = t.progress>=t.target && !t.done;
    item.innerHTML = '<div class="achvIcon">'+t.icon+'</div>'+
      '<div class="listInfo">'+
        '<div class="listName">'+t.name+'</div>'+
        '<div class="listDesc">进度 '+t.progress+'/'+t.target+' · 奖励 '+t.reward+' 🐾</div>'+
        '<div class="taskBar"><div style="width:'+Math.min(100,t.progress/t.target*100)+'%"></div></div>'+
      '</div>';
    var btn = document.createElement('button');
    btn.className = 'btn mini '+(t.done?'':canClaim?'green':'blue');
    btn.textContent = t.done?'已领':canClaim?'领取':'刷新';
    btn.onclick = function(){
      if(t.done) return;
      if(canClaim){
        G.coin += t.reward; t.done=true; saveData(); updateCoinDisplay(); renderTasks();
        toast("+"+t.reward+" 🐾");
      } else {
        /* ========== 广告接口：每日任务刷新 ========== */
        showModal("🔄 刷新任务","看广告刷新当前任务",[
          {text:"看广告刷新",cls:"green",cb:function(){
            showAdReward(function(){
              t.progress=0; t.done=false; saveData(); closeModal(); renderTasks();
              toast("✅ 已刷新");
            });
          }},
          {text:"取消",cls:"pink",cb:closeModal}
        ]);
      }
    };
    item.appendChild(btn);
    list.appendChild(item);
  });
}

function doSign(){
  var today = getTodayStr();
  if(G.signDate===today) return;
  var rewards = [50, 100, 150, 200, 300, 400, 800];
  G.signDays = Math.min(7, G.signDays+1);
  G.signDate = today;
  G.coin += rewards[G.signDays-1];
  if(G.signDays>=7){
    // 解锁一款限定皮肤
    for(var i=0;i<SKINS.length;i++){
      if(SKINS[i].rarity==='ssr' && !G.unlockedSkins[i]){
        G.unlockedSkins[i] = true;
        toast("🎁 额外获得 "+SKINS[i].name);
        break;
      }
    }
    G.signDays = 0; // 重置
  }
  saveData(); updateCoinDisplay(); renderSign(); playSound('coin');
  toast("+"+rewards[G.signDays===0?6:G.signDays-1]+" 🐾");
}

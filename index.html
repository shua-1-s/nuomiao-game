/* ================= 12/24 宫格三消合成 =================
 * 4 行 × 3 列 = 12 格 起手
 * 合成出 7 级猫咪后扩展为 6 行 × 4 列 = 24 格
 * 滑动相邻方块交换 → 3 连合成升一级 → 下落填充 → 连锁
 * 8 个等级对应 8 只商城猫咪
 */
/* 进入合成游戏入口 */
function mgEnterGame(){
  goScreen('mergeScreen');
  initAudio();  // 用户点击按钮时初始化音频(需要用户手势)
  mgAnimating = false;
  mgCancelItemMode && mgCancelItemMode();
  // 初始给新玩家 1 个换位符 + 1 个升级符
  if(!G.mgIntroShown){
    mgItems = {swap:2, upgrade:2, merge:2};
    mgMergeCounts = {swap:0, upgrade:0, merge:0};
  }
  renderMerge();
  mgInitGestures();
  // 第一次进入 显示玩法说明 并阻止自动回合
  if(!G.mgIntroShown){
    G.mgIntroShown = true;
    saveData();
    // 打断 renderMerge 里的自动 startRound
    if(mgRoundTimer){ clearInterval(mgRoundTimer); mgRoundTimer=null; }
    mgRoundActive = false;
    setTimeout(mgShowIntro, 300);
  }
}

/* ================= 12/16 宫格单线合成 =================
 * 单线 8 级: 橘猫→白猫→灰猫→英短→布偶→暹罗→樱花→终极
 * 起手 4×3=12格, 第5回合后 4×4=16格
 */
var MG_ROWS = 4;
var MG_COLS = 3;
var MG_MAX_LEVEL = 8;           // 最高 8 级 = 终极猫
var MG_ULTIMATE_LEVEL = 8;      // 终极猫等级
var MG_EXPAND_AT_ROUND = 5;     // 第 5 回合后扩展
var MG_LOCK_AT_ROUND = 10;      // 第 10 回合起出现临时锁定块
var mgBoard = null;
var mgNextId = 1;
var mgAnimating = false;
var mgCellSize = 90;
var mgScore = 0;
var mgGap = 6;
var mgExpanded = false;
// 回合
var mgRound = 1;
var mgRoundTarget = 50;
var mgRoundTime = 60;
var mgRoundTimer = null;
var mgRoundActive = false;
// 道具栏
var mgItems = {swap:2, upgrade:2, merge:2};
var mgItemMax = {swap:3, upgrade:2, merge:1};
// 道具获取计数（每次成功合成+1 满足阈值给道具）
var mgMergeCounts = {swap:0, upgrade:0, merge:0};
var mgMergeThresholds = {swap:4, upgrade:5, merge:6};
// 道具使用状态（选择格子）
var mgItemMode = null;  // null | 'swap' | 'upgrade' | 'merge'
var mgItemSelection = [];  // 选中的格子
// 滑动计数器（给临时锁定用）
var mgSwipeCount = 0;
// 固定石块 / 锁定块数量
var MG_MAX_STONES = 1;     // 最多 1 个石块
var MG_MAX_LOCKS = 0;      // 不使用锁定块
// 单线 8 级皮肤: 橘(0) 白(1) 灰(3) 英短(5) 布偶(10) 暹罗(11) 樱花(18) 终极(29)
var MG_LEVEL_SKINS = [0, 1, 3, 5, 10, 11, 18, 29];
var MG_LEVEL_NAMES = ['橘猫','白猫','灰猫','英短','布偶','暹罗','樱花','终极'];
var mgLastSnapshot = null;

/* 创建新方块数据
 * type: 'normal' | 'stone' | 'wild'
 *   stone - 固定石块 (level=0, 不能合成)
 *   wild  - 奶牛猫万能牌 (level=1, 可与 A/B 任一 1 级合成)
 * line: 'A' | 'B'  合成线
 * locked: 是否临时锁定 (数字表示剩余锁定次数, 0=未锁)
 */
function mgMakeBlock(level, opts){
  opts = opts || {};
  return {
    level: level,
    id: 'mg'+(mgNextId++),
    type: opts.type || 'normal',
    locked: 0
  };
}

/* 创建石块 */
function mgMakeStone(){
  return {level:0, id:'stone'+(mgNextId++), type:'stone', locked:0};
}



/* 初始化棋盘 */
function mgInit(){
  // 棋盘尺寸:第 5 回合后 4×4
  mgExpanded = (mgRound >= MG_EXPAND_AT_ROUND);
  MG_ROWS = 4;  // always 4 rows
  MG_COLS = mgExpanded ? 4 : 3;  // 3→4 cols
  mgBoard = [];
  for(var r=0;r<MG_ROWS;r++){
    var row = [];
    for(var c=0;c<MG_COLS;c++){
      row.push(mgMakeBlock(mgRandomNewLevel()));
    }
    mgBoard.push(row);
  }
  // 第 8 回合起 随机放 0-1 个石块（50% 概率出现）
  if(mgRound >= 8 && Math.random() < 0.5){
    var stTries = 30;
    while(stTries-- > 0){
      var sr = Math.floor(Math.random()*MG_ROWS);
      var sc = Math.floor(Math.random()*MG_COLS);
      if(mgBoard[sr][sc].type === 'normal'){
        mgBoard[sr][sc] = mgMakeStone();
        break;
      }
    }
  }
  // 消除开局 3 连
  var mergeSafety = 30;
  while(mergeSafety-- > 0){
    var found = mgFindMatches();
    if(found.length === 0) break;
    found.forEach(function(m){
      m.cells.forEach(function(p){
        if(mgBoard[p.r][p.c].type === 'normal'){
          mgBoard[p.r][p.c] = mgMakeBlock(mgRandomNewLevel());
        }
      });
    });
  }
}

/* 随机生成新方块的等级
 * 小棋盘: 75% 1级 + 25% 2级
 * 大棋盘: 60% 1级 + 28% 2级 + 10% 3级 + 2% 4级
 */
function mgRandomNewLevel(){
  var rand = Math.random();
  if(mgExpanded){
    if(rand<0.60) return 1;
    if(rand<0.88) return 2;
    if(rand<0.98) return 3;
    return 4;
  }
  return rand<0.75 ? 1 : 2;
}



/* 查找所有 3+ 连续同级方块（跳过石块/锁定） */
function mgFindMatches(){
  var matches = [];
  // 横向
  for(var r=0;r<MG_ROWS;r++){
    var c0 = 0;
    while(c0 < MG_COLS){
      var cur0 = mgBoard[r][c0];
      if(!cur0 || cur0.type==='stone' || cur0.locked>0){ c0++; continue; }
      var len0 = 1;
      while(c0+len0 < MG_COLS){
        var next = mgBoard[r][c0+len0];
        if(!next || next.type==='stone' || next.locked>0) break;
        if(next.level !== cur0.level) break;
        len0++;
      }
      if(len0>=3){
        var cells0 = [];
        for(var k0=0;k0<len0;k0++) cells0.push({r:r, c:c0+k0});
        matches.push({level:cur0.level, cells:cells0, center:{r:r, c:c0+Math.floor(len0/2)}, isMax:cur0.level>=MG_MAX_LEVEL});
      }
      c0 += Math.max(1, len0);
    }
  }
  // 纵向
  for(var c=0;c<MG_COLS;c++){
    var r2 = 0;
    while(r2 < MG_ROWS){
      var cur = mgBoard[r2][c];
      if(!cur || cur.type==='stone' || cur.locked>0){ r2++; continue; }
      var len = 1;
      while(r2+len < MG_ROWS){
        var next = mgBoard[r2+len][c];
        if(!next || next.type==='stone' || next.locked>0) break;
        if(next.level !== cur.level) break;
        len++;
      }
      if(len>=3){
        var cells = [];
        for(var k=0;k<len;k++) cells.push({r:r2+k, c:c});
        matches.push({level:cur.level, cells:cells, center:{r:r2+Math.floor(len/2), c:c}, isMax:cur.level>=MG_MAX_LEVEL});
      }
      r2 += Math.max(1, len);
    }
  }
  return matches;
}

/* 道具按钮 HTML */

  var count = mgItems[type]||0;
  var threshold = mgMergeThresholds[type];
  var progress = Math.min(mgMergeCounts[type]||0, threshold);
  var max = mgItemMax[type];
  var bgColors = {swap:'#fff3e0', upgrade:'#e8f5e9', merge:'#fce4ec'};
  var borderColors = {swap:'#ff9800', upgrade:'#4caf50', merge:'#e91e63'};
  var activeBorder = count > 0 ? borderColors[type] : '#ddd';
  var glow = count > 0 ? 'box-shadow:0 0 12px '+borderColors[type]+'60,0 3px 8px rgba(0,0,0,.1)' : 'box-shadow:0 3px 8px rgba(0,0,0,.08)';
  return '<div class="mgItemBtn" data-type="'+type+'" onclick="mgActivateItem(\''+type+'\')" '+
    'style="flex:1;max-width:120px;background:linear-gradient(145deg,#fff,'+bgColors[type]+');border-radius:16px;padding:8px 6px;text-align:center;cursor:pointer;'+
    'border:3px solid '+activeBorder+';position:relative;'+glow+';transition:transform .15s, border-color .3s, box-shadow .3s">'+
    '<div style="font-size:28px;line-height:1">'+icon+'</div>'+
    '<div style="font-size:13px;font-weight:900;color:#7a4a2a;margin-top:3px">'+label+'</div>'+
    '<div style="font-size:15px;font-weight:900;color:'+(count>0?borderColors[type]:'#bbb')+'"><span id="mgItemCnt_'+type+'">'+count+'</span>/'+max+'</div>'+
    '<div style="height:4px;background:#f0e0d0;border-radius:4px;margin-top:3px;overflow:hidden">'+

/* 更新 UI 数值 */
function mgUpdateUI(){
  var sn = document.getElementById('mgScoreNum');
  if(sn) sn.textContent = mgScore;
  var tn = document.getElementById('mgTargetNum');
  if(tn) tn.textContent = mgRoundTarget;
  var rn = document.getElementById('mgRoundNum');
  if(rn) rn.textContent = mgRound;
  var pb = document.getElementById('mgProgressBar');
  if(pb) pb.style.width = Math.min(100, mgScore/mgRoundTarget*100)+'%';
  // 道具计数
  var borderColors = {swap:'#ff9800', upgrade:'#4caf50', merge:'#e91e63'};
  ['swap','upgrade','merge'].forEach(function(t){
    var cnt = document.getElementById('mgItemCnt_'+t);
    if(cnt) cnt.textContent = mgItems[t]||0;
    var prog = document.getElementById('mgItemProg_'+t);
    if(prog){
      var thresh = mgMergeThresholds[t];
      var cur = Math.min(mgMergeCounts[t]||0, thresh);
      prog.style.width = (cur/thresh*100)+'%';
    }
    var btn = document.querySelector('.mgItemBtn[data-type="'+t+'"]');
    if(btn){
      var hasItem = mgItems[t] > 0;
      btn.style.borderColor = hasItem ? borderColors[t] : '#ddd';
      btn.style.boxShadow = hasItem ? '0 0 12px '+borderColors[t]+'60,0 3px 8px rgba(0,0,0,.1)' : '0 3px 8px rgba(0,0,0,.08)';
    }
  });
}

/* 计算格子在棋盘内的像素位置 */
function mgPos(r, c){
  return {
    x: mgGap + c*(mgCellSize+mgGap),
    y: mgGap + r*(mgCellSize+mgGap)
  };
}

/* 重绘整个棋盘 */
function mgDrawAll(){
  var board = document.getElementById('mgBoard');
  if(!board) return;
  board.innerHTML = '';
  // 背景格子
  for(var r=0;r<MG_ROWS;r++){
    for(var c=0;c<MG_COLS;c++){
      var bg = document.createElement('div');
      var p = mgPos(r,c);
      bg.style.cssText = 'position:absolute;width:'+mgCellSize+'px;height:'+mgCellSize+'px;left:'+p.x+'px;top:'+p.y+'px;background:rgba(255,255,255,.4);border-radius:14px;border:2px dashed rgba(255,140,107,.25)';
      board.appendChild(bg);
    }
  }
  // 方块
  for(var r2=0;r2<MG_ROWS;r2++){
    for(var c2=0;c2<MG_COLS;c2++){
      var blk = mgBoard[r2][c2];
      if(blk) mgDrawBlock(blk, r2, c2);
    }
  }
}

/* 画单个方块 */
function mgDrawBlock(blk, r, c){
  var board = document.getElementById('mgBoard');
  var p = mgPos(r, c);

  // 石块 - 灰色方块不是猫咪
  if(blk.type === 'stone'){
    var stone = document.createElement('div');
    stone.dataset.blkid = blk.id;
    stone.style.cssText = 'position:absolute;width:'+mgCellSize+'px;height:'+mgCellSize+'px;'+
      'left:'+p.x+'px;top:'+p.y+'px;'+
      'background:linear-gradient(145deg,#707070,#404040);border-radius:14px;'+
      'box-shadow:inset -3px -4px 8px rgba(0,0,0,.5),inset 2px 2px 5px rgba(255,255,255,.2),0 3px 8px rgba(0,0,0,.3);'+
      'display:flex;align-items:center;justify-content:center;font-size:'+(mgCellSize*.5)+'px;'+
      'transition:left .2s, top .2s';
    stone.innerHTML = '🔳';
    board.appendChild(stone);
    return stone;
  }

  var skinIdx = MG_LEVEL_SKINS[blk.level-1];
  var el = createCatEl({dir:'up', id:blk.id, special:null}, skinIdx);
  el.dataset.blkid = blk.id;
  el.style.position = 'absolute';
  el.style.width = mgCellSize+'px';
  el.style.height = mgCellSize+'px';
  el.style.left = p.x+'px';
  el.style.top = p.y+'px';
  el.style.transition = 'left .2s ease-out, top .2s ease-out';
  el.style.cursor = 'grab';
  el.style.touchAction = 'none';

  var badge = document.createElement('div');
  badge.style.cssText = 'position:absolute;top:-3px;left:-3px;background:linear-gradient(145deg,#ff9a56,#c62828);color:#fff;font-size:12px;font-weight:900;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;z-index:25;border:2px solid #fff;box-shadow:0 2px 5px rgba(0,0,0,.35)';
  badge.textContent = blk.level;
  el.appendChild(badge);

  // 临时锁定 - 加锁图标覆盖
  if(blk.locked > 0){
    var lock = document.createElement('div');
    lock.className = 'mgLockOverlay';
    lock.style.cssText = 'position:absolute;inset:0;background:rgba(50,50,80,.5);border-radius:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:30;font-size:'+(mgCellSize*.4)+'px;pointer-events:none';
    lock.innerHTML = '🔒<div style="font-size:10px;color:#fff;font-weight:900;margin-top:2px">×'+blk.locked+'</div>';
    el.appendChild(lock);
    el.style.cursor = 'not-allowed';
  }

  board.appendChild(el);
  return el;
}

/* ================= 滑动手势 - 全局监听版 ================= 
 * 之前的版本绑在每个方块上 重绘后失效
 * 改为绑在棋盘上 用坐标判断点中哪个方块
 */
function mgInitGestures(){
  var wrap = document.getElementById('mgBoardWrap');
  if(!wrap || wrap.dataset.bound) return;
  wrap.dataset.bound = '1';

  var sx=0, sy=0, sr=-1, sc=-1, dragging=false;

  function getRC(clientX, clientY){
    var rect = document.getElementById('mgBoard').getBoundingClientRect();
    var x = clientX - rect.left;
    var y = clientY - rect.top;
    // 反推 r,c
    var c = Math.floor((x - mgGap/2) / (mgCellSize+mgGap));
    var r = Math.floor((y - mgGap/2) / (mgCellSize+mgGap));
    if(r<0||r>=MG_ROWS||c<0||c>=MG_COLS) return null;
    return {r:r, c:c};
  }

  function start(x, y){
    if(mgAnimating) return;
    var pos = getRC(x, y);
    if(!pos) return;
    if(!mgBoard[pos.r][pos.c]) return;
    sx = x; sy = y; sr = pos.r; sc = pos.c; dragging = true;
  }

  function end(x, y){
    if(!dragging) return;
    dragging = false;
    var dx = x - sx, dy = y - sy;
    var ax = Math.abs(dx), ay = Math.abs(dy);
    // 道具模式下 点击(未滑动) 视为选择格子
    if(mgItemMode && ax<12 && ay<12){
      mgHandleItemClick(sr, sc);
      return;
    }
    if(ax<15 && ay<15) return;  // 没动够
    // 滑动但处于道具模式 - 取消道具模式
    if(mgItemMode){
      mgCancelItemMode();
    }
    var dr=0, dc=0;
    if(ax > ay){
      dc = dx>0 ? 1 : -1;
    } else {
      dr = dy>0 ? 1 : -1;
    }
    var nr = sr+dr, nc = sc+dc;
    if(nr<0||nr>=MG_ROWS||nc<0||nc>=MG_COLS) return;
    mgSwap(sr, sc, nr, nc);
  }

  // 触摸事件 - 直接绑在 wrap 上 不会因为重绘失效
  wrap.addEventListener('touchstart', function(e){
    e.preventDefault();
    var t = e.touches[0];
    start(t.clientX, t.clientY);
  }, {passive:false});
  wrap.addEventListener('touchmove', function(e){
    if(dragging) e.preventDefault();
  }, {passive:false});
  wrap.addEventListener('touchend', function(e){
    if(!dragging) return;
    e.preventDefault();
    var t = e.changedTouches[0];
    end(t.clientX, t.clientY);
  }, {passive:false});
  // 鼠标事件
  wrap.addEventListener('mousedown', function(e){
    e.preventDefault();
    start(e.clientX, e.clientY);
  });
  window.addEventListener('mouseup', function(e){
    if(dragging) end(e.clientX, e.clientY);
  });
}

/* 交换两个方块 */
function mgSwap(r1, c1, r2, c2){
  if(mgAnimating) return;
  var b1 = mgBoard[r1][c1];
  var b2 = mgBoard[r2][c2];
  if(!b1 || !b2) return;

  // 石块和锁定块不能参与交换
  if(b1.type==='stone' || b2.type==='stone'){
    toast("🔳 石块不能移动");
    return;
  }
  if(b1.locked>0 || b2.locked>0){
    toast("🔒 被锁定的方块不能移动");
    return;
  }

  // 保存快照
  mgLastSnapshot = mgSaveSnapshot();

  mgAnimating = true;
  // 数据交换
  mgBoard[r1][c1] = b2;
  mgBoard[r2][c2] = b1;

  // 检查是否产生合成
  var matches = mgFindMatches();
  if(matches.length === 0){
    // 无效 - 视觉交换再回退
    mgMoveBlock(b1.id, r2, c2);
    mgMoveBlock(b2.id, r1, c1);
    // 数据回退
    mgBoard[r1][c1] = b1;
    mgBoard[r2][c2] = b2;
    setTimeout(function(){
      mgMoveBlock(b1.id, r1, c1);
      mgMoveBlock(b2.id, r2, c2);
      setTimeout(function(){ mgAnimating = false; }, 220);
    }, 220);
    playSound('click');
    return;
  }

  // 有效滑动 - 计数 + 减少锁定次数
  mgSwipeCount++;
  mgDecreaseLocks();

  // 视觉交换
  mgMoveBlock(b1.id, r2, c2);
  mgMoveBlock(b2.id, r1, c1);
  playSound('slide');
  setTimeout(function(){ mgProcessChain(); }, 220);
}

/* 所有锁定块 -1, 到 0 自动解锁 */
function mgDecreaseLocks(){
  for(var r=0;r<MG_ROWS;r++){
    for(var c=0;c<MG_COLS;c++){
      var b = mgBoard[r][c];
      if(b && b.locked>0){
        b.locked--;
        if(b.locked === 0){
          // 解锁 - 特效
          var el = document.querySelector('[data-blkid="'+b.id+'"]');
          if(el){
            var lo = el.querySelector('.mgLockOverlay');
            if(lo){
              lo.style.transition = 'opacity .3s, transform .3s';
              lo.style.opacity = '0';
              lo.style.transform = 'scale(1.5)';
              setTimeout(function(ll){ return function(){if(ll.parentNode) ll.parentNode.removeChild(ll);}}(lo), 320);
            }
            el.style.cursor = 'grab';
          }
          playSound('coin');
          toast("🔓 解锁!");
        } else {
          // 更新锁定计数显示
          var el2 = document.querySelector('[data-blkid="'+b.id+'"]');
          if(el2){
            var lo2 = el2.querySelector('.mgLockOverlay div');
            if(lo2) lo2.textContent = '×'+b.locked;
          }
        }
      }
    }
  }
}

/* 移动一个方块到 r,c */
function mgMoveBlock(id, r, c){
  var el = document.querySelector('[data-blkid="'+id+'"]');
  if(!el) return;
  var p = mgPos(r, c);
  el.style.left = p.x+'px';
  el.style.top = p.y+'px';
}

/* 处理合成连锁 */
function mgProcessChain(){
  var matches = mgFindMatches();
  if(matches.length === 0){
    mgAnimating = false;
    // 检查回合胜利
    if(mgRoundActive && mgScore >= mgRoundTarget){
      mgRoundSuccess();
      return;
    }
    // 检查死局
    if(mgRoundActive){
      mgCheckDeadlock();
    }
    return;
  }

  var toRemove = {};
  var toCreate = [];
  var hitUltimate = false;  // 是否合成出终极猫

  matches.forEach(function(m){
    m.cells.forEach(function(p){ toRemove[p.r+'_'+p.c] = true; });
    if(m.isMax){
      // 7 级(终极猫)×3 - 终极爆发
      mgScore += m.level * 100;
      // 触发终极爆发标记(会在合成效果中处理)
      toCreate.push({r:m.center.r, c:m.center.c, level:m.level+1, boom:true});
    } else {
      toCreate.push({r:m.center.r, c:m.center.c, level:m.level+1});
      // 分数:等级越高越多 (1*13, 2*26, 3*57, 4*92, 5*125, 6*168)
      var scoreGain = m.level * (10 + m.level*3);
      mgScore += scoreGain;
    }
    // 道具计数 - 每次成功合成 +1
    mgMergeCounts.swap++;
    mgMergeCounts.upgrade++;
    mgMergeCounts.merge++;
  });

  // 1. 缩小消失
  Object.keys(toRemove).forEach(function(key){
    var parts = key.split('_');
    var r = parseInt(parts[0]), c = parseInt(parts[1]);
    var blk = mgBoard[r][c];
    if(blk){
      var el = document.querySelector('[data-blkid="'+blk.id+'"]');
      if(el){
        el.style.transition = 'transform .2s, opacity .2s';
        el.style.transform = 'scale(.1)';
        el.style.opacity = '0';
        setTimeout(function(){ if(el.parentNode) el.parentNode.removeChild(el); }, 220);
      }
    }
  });
  playSound('explode');
  vibrate([20, 10, 30]);
  mgUpdateUI();

  // 2. 200ms 后清空数据 + 生成中心点的新方块
  setTimeout(function(){
    Object.keys(toRemove).forEach(function(key){
      var parts = key.split('_');
      mgBoard[parseInt(parts[0])][parseInt(parts[1])] = null;
    });
    toCreate.forEach(function(nb){
      if(nb.boom){
        // 终极猫×3: 不生成新方块 直接爆发 +金币
        mgBoard[nb.r][nb.c] = null;
        return;
      }
      // 创建新方块 带合成线
      var newBlk = mgMakeBlock(nb.level);
      mgBoard[nb.r][nb.c] = newBlk;
      var el = mgDrawBlock(newBlk, nb.r, nb.c);
      el.style.transform = 'scale(0)';
      el.style.transition = 'transform .35s cubic-bezier(.5,1.6,.5,1)';
      requestAnimationFrame(function(){
        requestAnimationFrame(function(){
          el.style.transform = 'scale(1)';
        });
      });
      // 合成出终极猫 - 弹窗+皮肤奖励
      if(nb.level === MG_MAX_LEVEL){
        hitUltimate = true;
      }
    });
    // 根据合成等级播放不同音调
    var maxLvCreated = toCreate.length > 0 ? Math.max.apply(null, toCreate.map(function(x){return x.level})) : 2;
    mgPlayMergeSound(maxLvCreated);

    // 道具掉落检测 (10% 概率)
    if(Math.random() < 0.1){
      mgTryGrantItem();
    }
    // 计数器达标检测
    mgCheckItemThreshold();

    // 3. 处理终极猫弹窗
    if(hitUltimate){
      setTimeout(mgShowUltimate, 800);
    }
    // 8级(终极猫)×3 爆发
    var boomCount = toCreate.filter(function(x){return x.boom}).length;
    if(boomCount > 0){
      setTimeout(mgShowBigBoom, 400);
    }

    // 4. 等出现动画完成后 → 下落填充
    setTimeout(function(){
      mgDropAndFill();
      setTimeout(function(){ mgProcessChain(); }, 280);
    }, 360);
  }, 220);
}

/* 道具计数器达标 → 发放道具 */
function mgCheckItemThreshold(){
  ['swap','upgrade','merge'].forEach(function(type){
    if(mgMergeCounts[type] >= mgMergeThresholds[type]){
      if(mgItems[type] < mgItemMax[type]){
        mgItems[type]++;
        mgMergeCounts[type] = 0;  // 重置计数
        mgShowItemGain(type, '计数达标');
      }
      // 如果道具已满，保持计数不归零（避免浪费），但也不增加道具
    }
  });
  mgUpdateUI();
}

/* 10% 概率随机掉落一个道具 */
function mgTryGrantItem(){
  var types = ['swap','upgrade','merge'];
  // 优先给未满的道具
  var available = types.filter(function(t){ return mgItems[t] < mgItemMax[t]; });
  if(available.length === 0) return;
  var pick = available[Math.floor(Math.random()*available.length)];
  mgItems[pick]++;
  mgShowItemGain(pick, '幸运掉落');
  mgUpdateUI();
}

/* 不同等级合成播放不同音调 */
function mgPlayMergeSound(level){
  initAudio();
  if(!audioCtx) return;
  var t = audioCtx.currentTime;
  // 等级越高音调越亮越长
  var freqs = [0, 523, 587, 659, 740, 880, 988, 1175, 1397]; // C5~F6 大致音阶
  var freq = freqs[level] || 800;
  var dur = 0.18 + level*0.04;
  // 主音
  var o = audioCtx.createOscillator();
  var g = audioCtx.createGain();
  o.type = 'triangle';
  o.frequency.setValueAtTime(freq, t);
  o.frequency.exponentialRampToValueAtTime(freq*1.5, t+dur);
  g.gain.setValueAtTime(.18, t);
  g.gain.exponentialRampToValueAtTime(.001, t+dur);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(t); o.stop(t+dur);
  // 高级追加和声
  if(level>=5){
    var o2 = audioCtx.createOscillator();
    var g2 = audioCtx.createGain();
    o2.type = 'sine';
    o2.frequency.setValueAtTime(freq*1.25, t+0.05);
    g2.gain.setValueAtTime(.12, t+0.05);
    g2.gain.exponentialRampToValueAtTime(.001, t+dur+0.1);
    o2.connect(g2); g2.connect(audioCtx.destination);
    o2.start(t+0.05); o2.stop(t+dur+0.1);
  }
}

/* 下落 + 顶部填充 (石块不下落, 占据固定位置) */
function mgDropAndFill(){
  for(var c=0;c<MG_COLS;c++){
    // 该列的新数组 - 石块保持 r, 其他方块压缩到底
    var stones = [];
    var moving = [];
    for(var r=0;r<MG_ROWS;r++){
      var b = mgBoard[r][c];
      if(b && b.type==='stone'){
        stones.push({r:r, blk:b});
      } else if(b){
        moving.push(b);
      }
    }
    var newCol = new Array(MG_ROWS).fill(null);
    stones.forEach(function(s){ newCol[s.r] = s.blk; });
    // 非石块从下往上填 (保持相对顺序: 原来在下面的在新列里还是下面)
    var movingIdx = moving.length - 1;
    for(var rr = MG_ROWS-1; rr >= 0; rr--){
      if(newCol[rr] !== null) continue;
      if(movingIdx >= 0){
        newCol[rr] = moving[movingIdx--];
      }
    }
    // 顶部空位生成新方块
    for(var rr2 = 0; rr2 < MG_ROWS; rr2++){
      if(newCol[rr2] === null){
        newCol[rr2] = mgMakeBlock(mgRandomNewLevel());
      }
    }
    // 写回
    for(var rr3 = 0; rr3 < MG_ROWS; rr3++){
      mgBoard[rr3][c] = newCol[rr3];
    }
  }
  mgRedrawSmoothly();
}

/* 平滑重绘：移动现有 + 创建新方块，确保不重叠 */
function mgRedrawSmoothly(){
  var board = document.getElementById('mgBoard');
  if(!board) return;

  // 步骤 1: 收集当前 DOM 中所有方块，按 id 索引
  var existingEls = {};
  var orphanEls = [];  // 不在当前棋盘数据里的 DOM（需要删除）
  var currentIds = {};
  for(var r0=0;r0<MG_ROWS;r0++){
    for(var c0=0;c0<MG_COLS;c0++){
      var bb = mgBoard[r0][c0];
      if(bb) currentIds[bb.id] = {r:r0, c:c0};
    }
  }
  board.querySelectorAll('[data-blkid]').forEach(function(el){
    var id = el.dataset.blkid;
    if(currentIds[id]){
      existingEls[id] = el;
    } else {
      // DOM 中存在但数据中没有 - 需要立即清掉 避免重叠
      orphanEls.push(el);
    }
  });
  // 步骤 2: 立即移除孤儿 DOM（这些可能是已消除的旧方块残留）
  orphanEls.forEach(function(el){
    if(el.parentNode) el.parentNode.removeChild(el);
  });

  // 步骤 3: 处理每个棋盘位置
  for(var r=0;r<MG_ROWS;r++){
    for(var c=0;c<MG_COLS;c++){
      var blk = mgBoard[r][c];
      if(!blk) continue;
      var p = mgPos(r, c);
      if(existingEls[blk.id]){
        // 已有 DOM - 移动到新位置
        var el = existingEls[blk.id];
        // 清掉可能的转换动画 残留样式
        el.style.transform = '';
        el.style.opacity = '1';
        el.style.transition = 'left .25s ease-out, top .25s ease-out';
        el.style.left = p.x+'px';
        el.style.top = p.y+'px';
      } else {
        // 新方块 - 创建 DOM 从顶部滑入
        var newEl = mgDrawBlock(blk, r, c);
        // 设置在目标 x 正上方 (-mgCellSize-4)
        newEl.style.transition = 'none';
        newEl.style.left = p.x+'px';
        newEl.style.top = (-mgCellSize-8)+'px';
        // 强制 reflow 使 transition none 生效
        void newEl.offsetHeight;
        (function(el2, targetY){
          // 下一帧开启 transition 移动到目标
          requestAnimationFrame(function(){
            el2.style.transition = 'top .3s ease-out';
            el2.style.top = targetY+'px';
          });
        })(newEl, p.y);
      }
    }
  }
}

/* ================= 回合制 ================= */
function mgStartRound(){
  mgRoundActive = true;
  mgRoundTime = Math.max(50, 70 - (mgRound-1));  // 首回合70秒 每回合-1秒 最低50秒
  mgRoundTarget = 50 + (mgRound-1)*30;
  mgScore = 0;
  mgUpdateUI();

  // 显示回合开始动画
  mgShowRoundStart();

  // 启动倒计时
  if(mgRoundTimer){ clearInterval(mgRoundTimer); }
  mgRoundTimer = setInterval(function(){
    mgRoundTime--;
    var t = document.getElementById('mgTimerBig');
    if(t){
      t.textContent = '⏱ '+mgRoundTime+'s';
      // 时间紧迫闪红
      if(mgRoundTime<=10){
        t.style.color = '#fff';
        t.style.textShadow = '0 0 8px #ff0';
        var bar = document.getElementById('mgRoundBar');
        if(bar) bar.style.animation = 'roundDanger .5s infinite';

    if(mgRoundTime<=0){

    }
  }, 1000);
}

  if(mgRoundTimer){ clearInterval(mgRoundTimer); mgRoundTimer = null; }
  mgRoundActive = false;
  var bar = document.getElementById('mgRoundBar');
  if(bar) bar.style.animation = '';

/* 激活道具模式 (选择格子) */
function mgActivateItem(type){

  }

  mgItemSelection = [];

      swap: '🔄 换位符 · 选择 2 个格子交换位置',

function mgCancelItemMode(){
  mgItemMode = null;
  mgItemSelection = [];
  var hint = document.getElementById('mgItemHint');
  if(hint) hint.style.display = 'none';
  document.querySelectorAll('.mgItemBtn').forEach(function(b){
    b.style.boxShadow = '';
    b.style.transform = '';
  });
  // 清除所有选中高亮
  document.querySelectorAll('[data-blkid]').forEach(function(el){
    el.style.outline = '';
    el.style.outlineOffset = '';
  });
}

/* 处理道具模式下的点击 (被手势逻辑调用) */
function mgHandleItemClick(r, c){
  if(!mgItemMode) return false;
  var blk = mgBoard[r][c];
  if(!blk){ toast("空格子"); return true; }
  // 石块/锁定块 对所有道具都无效
  if(blk.type === 'stone'){ toast("🔳 石块不能被道具影响"); return true; }
  if(blk.locked > 0){ toast("🔒 锁定块不能被道具影响"); return true; }

  if(mgItemMode === 'swap'){
    return mgItemSwapClick(r, c, blk);
  } else if(mgItemMode === 'upgrade'){
    return mgItemUpgradeClick(r, c, blk);
  } else if(mgItemMode === 'merge'){
    return mgItemMergeClick(r, c, blk);
  }
  return true;
}

/* 换位符: 选 2 格交换 */
function mgItemSwapClick(r, c, blk){
  // 已选过这一格 → 取消
  if(mgItemSelection.length===1 && mgItemSelection[0].r===r && mgItemSelection[0].c===c){
    mgItemSelection = [];
    var el0 = document.querySelector('[data-blkid="'+blk.id+'"]');
    if(el0){ el0.style.outline=''; el0.style.outlineOffset=''; }
    return true;
  }
  mgItemSelection.push({r:r, c:c});
  // 高亮
  var el = document.querySelector('[data-blkid="'+blk.id+'"]');
  if(el){
    el.style.outline = '4px solid #4caf50';
    el.style.outlineOffset = '-2px';
  }
  if(mgItemSelection.length === 2){
    var p1 = mgItemSelection[0], p2 = mgItemSelection[1];
    // 执行交换
    mgItems.swap--;
    var b1 = mgBoard[p1.r][p1.c];
    var b2 = mgBoard[p2.r][p2.c];
    mgBoard[p1.r][p1.c] = b2;
    mgBoard[p2.r][p2.c] = b1;
    mgMoveBlock(b1.id, p2.r, p2.c);
    mgMoveBlock(b2.id, p1.r, p1.c);
    playSound('slide');
    vibrate([30, 20, 40]);
    toast("🔄 换位成功");
    mgFlashScreen('#4caf50');
    mgCancelItemMode();
    mgUpdateUI();
    // 检查是否产生合成
    setTimeout(function(){
      mgAnimating = true;
      mgProcessChain();
    }, 250);
  }
  return true;
}

/* 升级符: 选 1 个方块 直接升 1 级 */
function mgItemUpgradeClick(r, c, blk){
  
  if(blk.level >= MG_MAX_LEVEL){ toast("已是最高级"); return true; }
  mgItems.upgrade--;
  // 视觉: 缩小消失 + 新方块出现
  var el = document.querySelector('[data-blkid="'+blk.id+'"]');
  if(el){
    el.style.transition = 'transform .25s, opacity .25s';
    el.style.transform = 'scale(1.5)';
    el.style.opacity = '0';
    setTimeout(function(){ if(el.parentNode) el.parentNode.removeChild(el); }, 260);
  }
  setTimeout(function(){
    var newBlk = mgMakeBlock(blk.level+1);
    mgBoard[r][c] = newBlk;
    var newEl = mgDrawBlock(newBlk, r, c);
    newEl.style.transform = 'scale(0)';
    newEl.style.transition = 'transform .35s cubic-bezier(.5,1.6,.5,1)';
    requestAnimationFrame(function(){
      requestAnimationFrame(function(){ newEl.style.transform = 'scale(1)'; });
    });
    mgPlayMergeSound(newBlk.level);
    // 合成出终极猫
    if(newBlk.level === MG_MAX_LEVEL){
      setTimeout(mgShowUltimate, 400);
    }
    // 检查连锁
    setTimeout(function(){
      mgAnimating = true;
      mgProcessChain();
    }, 400);
  }, 270);
  playSound('rankup');
  vibrate([40, 20, 60]);
  toast("⬆️ 升级成功");
  mgFlashScreen('#ffd700');
  mgCancelItemMode();
  mgUpdateUI();
  return true;
}

/* 合并符: 选 2 个同级同线方块合并成 1 个高级 */
function mgItemMergeClick(r, c, blk){
  
  if(blk.level >= MG_MAX_LEVEL){ toast("已是最高级"); return true; }

  if(mgItemSelection.length===1){
    var first = mgItemSelection[0];
    if(first.r===r && first.c===c){
      // 取消选择
      mgItemSelection = [];
      var el0 = document.querySelector('[data-blkid="'+blk.id+'"]');
      if(el0){ el0.style.outline=''; el0.style.outlineOffset=''; }
      return true;
    }
    var firstBlk = mgBoard[first.r][first.c];
    if(firstBlk.level !== blk.level){
      toast("必须是同级方块");
      return true;
    }

  }
  mgItemSelection.push({r:r, c:c});
  // 高亮
  var el = document.querySelector('[data-blkid="'+blk.id+'"]');
  if(el){
    el.style.outline = '4px solid #ff9a56';
    el.style.outlineOffset = '-2px';
  }
  if(mgItemSelection.length === 2){
    var p1 = mgItemSelection[0], p2 = mgItemSelection[1];
    mgItems.merge--;
    var b1 = mgBoard[p1.r][p1.c];
    var b2 = mgBoard[p2.r][p2.c];
    // 第一个消失
    var el1 = document.querySelector('[data-blkid="'+b1.id+'"]');
    if(el1){
      el1.style.transition = 'left .3s, top .3s, transform .3s, opacity .3s';
      // 飞向第二个
      var p2pos = mgPos(p2.r, p2.c);
      el1.style.left = p2pos.x+'px';
      el1.style.top = p2pos.y+'px';
      el1.style.opacity = '0';
      el1.style.transform = 'scale(.3)';
      setTimeout(function(){if(el1.parentNode) el1.parentNode.removeChild(el1);}, 320);
    }
    // 第二个消失
    var el2 = document.querySelector('[data-blkid="'+b2.id+'"]');
    if(el2){
      el2.style.transition = 'transform .3s, opacity .3s';
      el2.style.transform = 'scale(1.4)';
      el2.style.opacity = '0';
      setTimeout(function(){if(el2.parentNode) el2.parentNode.removeChild(el2);}, 320);
    }
    mgBoard[p1.r][p1.c] = null;
    // 在 p2 生成高一级方块
    setTimeout(function(){
      var newBlk = mgMakeBlock(b1.level+1, {line: b1.line});
      mgBoard[p2.r][p2.c] = newBlk;
      var newEl = mgDrawBlock(newBlk, p2.r, p2.c);
      newEl.style.transform = 'scale(0)';
      newEl.style.transition = 'transform .35s cubic-bezier(.5,1.6,.5,1)';
      requestAnimationFrame(function(){
        requestAnimationFrame(function(){ newEl.style.transform = 'scale(1)'; });
      });
      mgPlayMergeSound(newBlk.level);
      // 合成出终极猫
      if(newBlk.level === MG_MAX_LEVEL){
        setTimeout(mgShowUltimate, 400);
      }
      // 下落填充空格 (p1)
      setTimeout(function(){
        mgDropAndFill();
        setTimeout(function(){
          mgAnimating = true;
          mgProcessChain();
        }, 300);
      }, 400);
    }, 340);
    playSound('rankup');
    vibrate([40, 20, 60]);
    toast("✨ 合并成功");
    mgFlashScreen('#ffb6d9');
    mgCancelItemMode();
    mgUpdateUI();
  }
  return true;
}

/* 寻找一对可以 swap 产生合成的相邻方块 */
function mgFindPossibleSwap(){
  for(var r=0;r<MG_ROWS;r++){
    for(var c=0;c<MG_COLS;c++){
      var b = mgBoard[r][c];
      if(!b || b.type==='stone' || b.locked>0) continue;
      // 右
      if(c+1<MG_COLS && mgTrySwapCheck(r,c,r,c+1)){
        return {from:{r:r,c:c}, to:{r:r,c:c+1}};
      }
      // 下
      if(r+1<MG_ROWS && mgTrySwapCheck(r,c,r+1,c)){
        return {from:{r:r,c:c}, to:{r:r+1,c:c}};
      }
    }
  }
  return null;
}

function mgTrySwapCheck(r1,c1,r2,c2){
  var b1 = mgBoard[r1][c1], b2 = mgBoard[r2][c2];
  if(!b1 || !b2) return false;
  if(b1.type==='stone' || b2.type==='stone') return false;
  if(b1.locked>0 || b2.locked>0) return false;
  if(b1.level===b2.level) return false;  // same level won't help, swap is pointless by itself
  mgBoard[r1][c1] = b2;
  mgBoard[r2][c2] = b1;
  var found = mgFindMatches();
  mgBoard[r1][c1] = b1;
  mgBoard[r2][c2] = b2;
  return found.length > 0;
}

/* 创建棋盘快照 用于道具撤回 (保留完整字段) */
function mgSaveSnapshot(){
  var snap = [];
  for(var r=0;r<MG_ROWS;r++){
    var row = [];
    for(var c=0;c<MG_COLS;c++){
      var b = mgBoard[r][c];
      row.push(b ? {level:b.level, id:b.id, type:b.type, locked:b.locked} : null);
    }
    snap.push(row);
  }
  return snap;
}

function mgRestoreSnapshot(snap){
  return snap.map(function(row){
    return row.map(function(b){
      return b ? {level:b.level, id:b.id, type:b.type, locked:b.locked} : null;
    });
  });
}

/* ================= 离线收益 ================= */
function checkOfflineReward(){
  if(!G.lastOnline) { G.lastOnline=Date.now(); saveData(); return; }
  var now = Date.now();
  var hours = Math.min(12, (now-G.lastOnline)/3600000);
  if(hours<0.1) return;
  var reward = Math.floor(hours * G.totalPass * 2 * G.offlineSpeed);
  if(reward<10) return;
  setTimeout(function(){
    showModal("💤 离线收益","离开 "+hours.toFixed(1)+" 小时<br>获得离线金币 <b style='color:#ff6b4a;font-size:20px'>"+reward+"</b> 🐾",[
      {text:"领取",cls:"",cb:function(){
        G.coin+=reward; saveData(); updateCoinDisplay(); closeModal();
      }},
      {text:"双倍领取💎",cls:"green",cb:function(){
        /* ========== 广告接口：离线双倍 ========== */
        showAdReward(function(){
          G.coin+=reward*2; saveData(); updateCoinDisplay(); closeModal();
          toast("+"+(reward*2)+" 🐾");
        });
      }}
    ]);
  },500);
}

/* ================= 初始化 ================= */
function initMenuCat(){
  var m = document.getElementById('menuCat');
  m.innerHTML='';
  var cat = createCatEl({dir:'up',id:-1,special:null},G.curSkin);
  cat.style.position='relative';cat.style.width='130px';cat.style.height='130px';
  m.appendChild(cat);
  // 应用当前头像框样式
  var frame = FRAMES[G.curFrame];
  if(frame){
    m.style.border = frame.border;
    m.style.borderRadius = '50%';
    m.style.boxShadow = frame.glow;
    m.style.padding = '4px';
    // 调整尺寸补偿边框
    m.style.boxSizing = 'content-box';
  }
}

function init(){
  loadData();
  // 同步合成游戏的扩展状态
  if(G.mgExpanded){ mgExpanded = true; }
  initTasks();
  initMenuCat();
  updateCoinDisplay();
  updateRankBadge();
  // 全服通关率模拟（按日期浮动）
  var seed = parseInt(getTodayStr().split('-').join(''))%1000;
  var rate = (0.15 + (seed%50)*0.01).toFixed(2);
  document.getElementById('globalRate').textContent = rate+'%';
  // 离线收益检查
  checkOfflineReward();
  // 音频激活
  document.addEventListener('touchstart',function(){initAudio();},{once:true,passive:true});
  document.addEventListener('click',function(){initAudio();},{once:true});
  // 阻止默认缩放
  document.addEventListener('gesturestart',function(e){e.preventDefault();});
  document.addEventListener('touchmove',function(e){if(e.scale&&e.scale!==1)e.preventDefault();},{passive:false});
  // 窗口大小变化
  window.addEventListener('resize',function(){
    if(document.getElementById('gameScreen').classList.contains('active')) renderBoard();
  });
  // 定期保存
  setInterval(saveData, 30000);
  // 退出保存
  window.addEventListener('beforeunload',saveData);
}
init();
</script>
